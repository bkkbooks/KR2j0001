body:
  text: 歲時廣記引識貴乎博書患乎略故入鄧林則知杞梓之良窺武庫則識甲兵之富此太平時祖所以廣其記也然或記録雖詳而採擇之未精或條目雖備而顛末之多舛覽者病焉龜峰之麓梅溪之灣有隱君子廣寒之孫涕唾功名金玉篇籍採九流之芳潤擷百氏之英華輔以山經海圖神録怪牒窮力積稔萃成一書目曰歲時廣記搜節物之異聞考風俗之攸尚手編心緝博而不煩補白孔之或遺續晏曾之未備亦後來雜家者流之奇書也誠使操觚之士得之非特可施於竿櫝之貽抑且具助於江山之詠至於芳辰麗景懷古感今江心鏡之徵敷於散之辨隨叩隨應取之不窮當有發久不見異人必有得異書之歎者矣其有詢故實則筆閣而不書質異聞則口呿而不對此記問不廣之由故書不負人而人負書文林郎新得行在太平惠民和劑局監門道山居士劉純君錫撰有天之時有人之時寒暑之推遷此時之運於天者也歷書所載蓋莫詳焉至於因某日而載某事此時之係於人者端千緒萬非託之紀述則莫能探其源委耳噫慶道長於一陽之生謹履端於一歲之始是蓋天事人事之相參尤有可據彼仲夏之重五季秋之重九豈天之氣候然也而人實為之使微考訂孰知競渡之繇楚靈均登高之因費長房乎引類而伸若此者衆雖然荊楚歲時之記善矣惜乎失之拘也秦唐歲時之所記多矣惜乎未之備也今南潁陳君搜獵經傳以至野史異書凡有涉於節序者萃為巨帙殆靡一遺仰以稽諸天時俯以驗之人事題其篇端曰歲事廣記求豫文而序之豫惟陳君嘗編博聞三録盛行於世況此書該而不冗雅而不俚自當與並傳於無窮云宣教郎特差知無為軍巢縣事兼理武民兵軍正總轄屯戍兵馬借緋新安朱鑑撰
