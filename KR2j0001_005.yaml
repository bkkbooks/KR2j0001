body:
  text: 卷第三秋禮記鄉飲酒曰西方曰秋秋之為言愁也愁之以時察守義者也太玄經曰秋者物皆成象而聚也管子曰秋者陰氣始下故萬物收說文曰秋禾穀熟也淮南子曰秋為矩矩者所以方萬物也前漢律歷志曰少陰者西方西遷也陰氣遷落物也於時為秋秋𩏶也物𩏶斂乃成熟金從革改更也義者成成者方故為矩月令曰秋三月其日庚辛其帝少皞其神蓐收其蟲毛其音商其數九其味辛其臭羶其祀門祭先肝𩏶子由反孟秋月禮記月令曰孟秋之月日在翼昏建星中旦畢中律中夷則涼風至白露降寒蟬鳴鷹乃祭鳥天地始肅農乃登穀孝經緯曰大暑後十五日斗指坤為立秋後十五日斗指申為處暑三統歷曰立秋為七月節處暑為七月中氣處暑者謂暑將遏伏而潛處也周書時訓曰立秋之日涼風至後五日白露降後五日寒蜩鳴涼風不至國無嚴政白露不降民多咳病寒蜩不鳴人臣力爭處暑之日鷹乃祭鳥後五日天地始肅後五日農乃登穀白虎通德論曰七月律謂之夷則何夷傷則法也言萬物始傷被刑法也歐陽公秋聲賦云其為樂也商聲主西方之音夷則為七月之律商傷也物既老而悲傷夷戮也物既盛而當殺晉樂志曰七月之辰謂之申申者身也言時萬物身體皆成就也夏小正曰七月貍子肇肆肇始也肆遂也言其始遂也詩七月曰七月流火又曰七月鳴鳴又曰七月烹葵及菽又曰七月食瓜注云流下也火大火也李白詩云火落金風高謝靈運詩云火逝首秋節七命云龍火西頽提要録曰七月為蘭月纂要曰七月為首秋上秋蘭秋肇秋月令曰孟秋行冬令則陰氣大勝介蟲敗穀戎兵乃來行春令則其國乃旱陽氣復還五穀無實行夏令則國多火災寒熱不節民多瘧疾仲秋月月令曰仲秋之月日在角昏牽牛中旦觜觿中律中南呂盲風至鴻雁來玄鳥歸群鳥養羞日夜分雷乃收聲蟄蟲坯戶殺氣浸盛陽氣日衰水始涸孝經緯曰處暑後十五日斗指庚為白露後十五日斗指酉為秋分三統歷曰白露為八月節秋分為八月中氣白露者陰氣漸重露濃色白周書時訓曰白露之日鴻雁來後五日玄鳥歸後五日群鳥養羞鴻雁不來遠人背叛玄鳥不歸室家離散群烏不羞臣下驕慢秋分之日雷乃始收後五日蟄蟲坯戶後五日水始涸雷不始收聲諸侯淫汏蟄蟲不坯戶民靡有賴水不始涸介蟲為害白虎通德論曰八月律謂之南呂何南者任也言陽氣尚有任生薺麥也故陰拒之也晉樂志曰八月之辰謂之酉酉者緧也謂時物皆緧縮也夏小正曰八月辰則伏丹鳥羞白鳥白鳥蚊蚋也崔豹古今注云螢火一名丹鳥腐草化之羞進也謂食蚊蚋也詩七月曰八月雚葦又曰八月載績又曰八月其穫又曰八月剝棗又曰八月斷壺注云薍為雚葦為葭載績者絲事畢而麻事起其穫者禾可穫也剝擊也壺瓠也提要録曰八月為桂月纂要録曰八月曰仲商月令曰仲秋行春令則秋雨不降草木生榮國乃有恐行夏令則其國乃旱蟄蟲不藏五穀復生行冬令則風災數起收雷先行草木蚤死季秋月月令季秋之月日在房昏虛中旦柳中律中無射鴻雁來賓雀入大水為蛤菊有黃華豺乃祭獸戮禽草木黃落蟄蟲咸俯在內皆墐其戶孝經緯曰秋分後十五日斗指辛為寒露後十五日斗指戌為霜降三統歷曰寒露為九月節霜降為九月中氣寒露者言露氣寒將欲凝結周書時訓曰寒露之日鴻雁來賓後五日雀入大水為蛤後五日菊有黃華霜降之日豺祭獸後五日草木黃落後五日蟄蟲咸俯白虎通德論曰九月謂之無射何射者終也言萬物隨陽而終也晉樂志曰九月之辰謂之戌戌者滅也謂時物皆衰滅也夏小正曰九月內火注云大火心星也詩七月曰九月授衣又曰九月叔苴又曰九月滌場圃又曰九月肅霜注云叔拾也苴麻子也肅縮也霜降而收縮萬物也國語曰至于玄月注云九月為玄月范蠡曰王姑待至於玄月漢韓明府修孔子廟器表碑曰永壽二年霜月之靈說者疑是九月提要録曰九月為菊月纂要曰九月曰暮秋末秋季商杪秋亦曰霜辰亦曰授衣月令曰季秋行夏令則其國大水冬藏殃敗民多鼽嚏行冬令則國多盜賊邊境不寧土地分裂行春令則暖風來至民氣懈惰師興不居仙掌露前漢班固傳武帝建章宮露盤上有仙人掌承露和玉屑飲之金莖銅柱也神農本草云繁露水是秋露繁濃時也作盤以收之煎令稠可食之延年不飢漢武帝時東方朔得玄黃青露各盛五合帝賜群臣老者皆少病者皆除東方朔曰日初出處露皆如糖可食後武帝立金莖作仙人掌承露盤取云表之露服食之以求仙文選孟堅西都賦云抗仙掌以承露擢雙立之金莖張平子西京賦云承云表之清露青女霜淮南子秋三月氣不藏百蟲蟄青女乃出以降霜雪注云青女乃天神青腰玉女主霜雪也杜甫詩云飛霜任青女賜被隔南宮山谷詩云姮娥攜青女一笑粲萬瓦李商隱詩云青女素娥俱耐冷月中霜裹斗嬋娟呂夷簡詩云花愁青女再飛霜蓼花風月令章句仲秋白露節盲風至鄭玄云疾風也秦人謂之蓼花風梁文帝初秋詩云肓風度函谷墜露下芳枝裂葉風洞冥記裂葉風乃八月節也離合風陸機要覽列子御風而行常以立春歸於八荒立秋日游於風穴風至則草木皆生去則草木搖落謂之離合風鯉魚風提要録鯉魚風乃九月風也李賀詩云樓前流水江陵道鯉魚風起芙蓉老又古詞云瑞霞成綺映舴艋棹輕鯉魚狂風起黃雀雨提要録九月雨為黃雀雨羅鄂州詞云九月江南秋色黃雀雨鯉魚風豆花雨荊楚歲時記豆花雨乃八月雨也荻苗水水衡記黃河水七八月名荻苗水荻花正開也登高水水衡記黃河水九月名登高水一葉落淮南子一葉落而天下知秋韓文公詩云淮南悲葉落今我亦傷秋唐人詩云山僧不解數甲子一葉落知天下秋韋蘇州詩云新秋一葉落草木衰文選宋玉九辨悲哉秋之氣也皇天平分四時兮竊獨悲此凜秋蕭瑟兮草木搖落而變衰泬寥兮天高而氣清寂漻兮收潦而水清憭栗兮若在遠行李白詩云深秋宋玉悲老杜詩云搖落深知宋玉悲又云清秋宋玉悲陳簡齊詩云宋玉有文悲落葉警鶴鳴風土記鳴鶴戒露白鶴也此鳥性警至八月白露降即鳴而相警東坡詩云由來警露鶴石鴈飛南康記平固縣覆笥山上有湖中有石鴈浮於湖上每至秋飛鳴如候時也鱖魚肥海録碎事楝木華而石首至秋風起而鱖魚肥蟋蟀吟天寶遺事每秋時宮中妃妾以小金籠閉蟋蟀置枕函畔夜聽其聲時民間爭效之親燈火昌黎文韓退之送子阿符讀書城南詩云時秋積雨霽新涼入郊墟燈火稍可親簡編可卷舒圍棋局西京雜記戚夫人侍兒賈佩蘭言宮中八月四日出雕房北戶竹下圍碁勝者終年有福負者終年多病取絲縷就北辰星下求長命乃免秋菊酒唐書李適為學士凡天子饗會游豫唯宰相及學士得從秋登慈恩浮圖獻菊花酒稱壽思蒪鱸晉文苑傳張翰字季鷹吳郡人為齊王冏東曹椽見秋風起思吳中菰米蒪羹鱸魚膾嘆云人生貴得適志何能羈宦數百里外以要名爵乎乃嘆云秋風起兮木葉飛吳江水清鱸魚肥遂命駕而歸後齊王敗人皆謂之見機又海物異名記云江南人作鱠名郎官鱠言因張翰得名東坡詩云浮世功名食與眠季鷹直得水中仙不須更說知機早直為鱸魚也自賢又送人歸吳有詞云更有鱸魚堪切鱠山谷詩云東歸止為鱸魚鱠未敢知言許季鷹王荊公詩云慷慨秋風起悲歌不為鱸收兔毫墨藪筆取崇山絶仞中兔毛八九月收之筆頭長一寸管長五寸鋒齊腰彊者揮襟作之屈曲真草皆須盡一身之力而送之驗美玉地鏡經八月中草木獨有葉枝下垂者必有美玉又云八月後草木死者亦有玉點艾枝文昌雜録唐歲時節物八月一日有點艾枝盧公範饋餉儀云點炙枝以梨枝為之反銀盞中有硃砂銀枝子也厭兒疾荊楚歲時記八月十日泗民以朱點小兒頭名為天炙以厭疾也取柏露續齊諧記鄧紹八月朝入華山見一童子以五彩囊承取柏葉上露皆如珠子且云赤松先生取以明目今人八月朝作眼明袋是也又荊楚歲時記云四民並以錦綵為眼明囊云赤松子以八月囊承柏樹露為宜眼後世以金箔為之遞相餉遺結絲囊隋唐嘉話八月五日明皇生辰號千秋節王公戚里進金鏡士庶結承露絲囊相遺述征記云八月作五明囊盛百草露以洗眼登南樓晉史庾亮傳亮鎮武昌諸佐史殷浩之徒秋夜乘月共登南樓俄而亮至諸人將起避之亮徐曰諸君小住老子於此興復不淺便據胡床與浩等談詠竟夕其坦率如此陶侃曰亮非惟風流更有為政之實也老杜詩云月靜庾公樓懷故里提要録王粲觀秋月懷弟妹故里而傷神老杜詩云曉鶯工迸淚秋月解傷神注云春鶯秋月人所賞玩而鶯所工者在于迸人之淚月所解者在于傷人之神蓋亂離疾病之所感也悲遊子梁史江淹過灞陵秋深葉脫乃嘆曰何限風物寥落秖悲遊子故園之思老杜詩云風物悲遊子江山憶故人歎謫仙文粹李白秋興歌我覺秋興逸誰云秋興悲賀知章見之曰是子謫仙人也賞白蓮天寶遺事明皇八月太液池有千葉白蓮數枝盛開帝與貴戚宴賞左右皆嘆羡久之帝指貴妃示左右爭如我解語花古詞云翠蓋盈盈紅粉面葉底荷花解語水晶宮漁隱叢話吳興謂之水晶宮而不載之圖經惟吳興集有之剌史楊漢公九月十五日夜絶句云江南地暖少嚴風九月炎涼正得中溪上玉樓樓上月清光合在水晶宮疑因此而得名也
