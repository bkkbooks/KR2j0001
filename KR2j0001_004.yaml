body:
  text: 卷第二夏禮記鄉飲酒曰南方曰夏夏之為言假也養之長之假之仁也太玄經曰夏者物之修長也董仲舒策曰陽常居大夏以生育長養為事淮南子曰夏為衡衡者所以平萬物也前漢律歷志曰太陽者南方南任也陽氣任養物於時為夏夏假也物假大乃宣平火炎上禮者齊齊者平故為衡也月令曰夏三月其日丙丁其帝炎帝其神祝融其蟲羽其數七其味苦其臭焦其祀灶祭先肺孟夏月禮記月令曰孟夏之月日在畢昏翼中旦婺女中律中仲呂螻蟈鳴蚯蚓出王瓜生苦菜莠靡草死麥秋至三統歷曰立夏為四月節小滿為四月中氣小滿者言物長於此小得盈滿孝經緯曰穀雨後十五日斗指巽為立夏後十五日斗指已為小滿周書時訓曰立夏之日螻蟈鳴後五日蚯蚓出後五日王瓜生小滿之日苦菜秀後五日靡草死後五日麥秋至白虎通德論曰四月律謂之仲呂何言陽氣極將彼故復中難之也晉志云呂者助也謂陽氣盛長陰助成功也晉樂志云四月之辰謂之巳巳者起也物至此時畢盡而起也夏小正曰四月昴則見詩七月曰四月秀葽注云不榮而實曰秀葽草也西京雜記曰陽德用事則和氣皆陽建已之月是也故陽謂之正陽之月又曰四月陽雖用事而陽不獨存此月純陽疑於無陰故謂之陰月纂要云四月曰首夏維夏文選注鄭玄曰四月為除月月令曰孟夏行秋令則苦雨數來五穀不滋四鄙入保行冬令則草木蚤落後乃大水敗其城郭行春令則蝗蟲為災暴風來格秀草不實仲夏月月令曰仲夏之月日在東井昏亢中旦危中律中蕤賓小暑至螳蜋生鶪始鳴反舌無聲鹿角解蟬始鳴半夏生木堇榮孝經緯曰小滿後十五日斗指丙為芒種後十五日斗指午為夏至三統歷曰芒種為五月節夏至為五月中氣芒種者言有芒之穀可稼種也周書時訓曰芒種之日螳蜋生後五日鶪始鳴後五日反舌無聲夏至之日鹿角解後五日蟬始鳴後五日半夏生白虎通德論曰五月律謂之蕤賓何蕤者下也賓者敬也言陽氣上極陰氣始賓敬之也晉樂志云五月之辰謂之午午者長也大也言物皆長大也夏小正曰五月參則見蜋蜩鳴初昏大火中注云大火心星名也詩七月曰五月鳴蜩又曰五月斯螽動股注云蜩螳也斯螽蜈蝑也吳子夜四時歌曰鬱蒸仲暑月東坡詩云飛龍御月作秋涼注云謂五月也月令曰仲夏行冬令則雹凍傷穀道路不通暴兵來至行春令則五穀晚熟百螣時起其國乃飢行秋令則草木零落果實早成民殃於疫季夏月月令曰季夏之月日在柳昏火中旦奎中律中林鐘溫風始至蟋蟀居壁鷹乃學習腐草為螢土潤溽暑大雨時行孝經緯曰夏至後十五日斗指丁為小暑後十五日斗指未為大暑三統歷曰小暑為六月節大暑為六月中氣小暑大暑就極熱之中分為小大月初為小月半為大周書時訓曰小暑之日溫風至後五日蟋蟀居壁後五日鷹乃學習大暑之日腐草為螢後五日土潤溽暑後五日大雨時行白虎通德論曰六月律謂之林鍾何林者衆也萬物成熟種類衆多晉樂志云六月之辰謂之未未者味也謂時萬物向成有滋味也夏小正曰六月鷹始摯詩七月曰六月莎雞振羽又云六月食鬱及薁注云鬱棣屬薁櫻薁也纂要曰六月曰徂暑月令曰季夏行春令則穀實鮮落國多風咳民乃遷徙行秋令則丘隰水潦禾稼不熟乃多女災行冬令則風寒不時鷹隼蚤鷙四鄙入保黃梅雨風土記夏至雨名黃梅雨霑衣服皆敗黤四時纂要云梅熟而雨曰梅雨又閩人以立夏後逢庚日為入梅芒種後逢王為出梅農以得梅雨乃宜耕耨故諺云梅不雨無米炊瑣碎録又云芒種後逢壬入梅前半月為梅雨後半月為時雨遇雷電謂之斷梅數說未知孰是又陳氏手記云梅雨水洗瘡疥滅瘢痕入醬令易熟沾衣便腐浣垢如灰汁有異他水江淮以南地氣卑濕五月上旬連下旬尤甚梅雨壞衣當以梅葉洗之餘並不脫杜甫詩云南京犀浦道四月熟黃梅湛湛長江去冥冥細雨來歐陽公詩云春寒欲盡梅黃雨東坡詩云不趁青梅嘗煮酒要看細雨濕黃梅又云佳節連梅雨又云怕見梅黃雨細時王維詩云梅天一雨清送梅雨埤雅今江湘二浙四五月間梅欲黃落則水潤土溽柱磉皆汗蒸鬱成雨謂之梅雨自江以南三月雨謂之迎梅五月雨謂之送梅杜甫詩云石枕涼生菌閣虛已應梅潤入圖書濯枝雨風土記仲夏雨濯枝蕩川注云此節常有大雨名曰濯枝雨留客雨陸機要覽昔羽山有神人焉逍遙于中嶽與左元放共遊薊子訓所坐欲起子訓應欲留之一日之中三雨今呼五月三雨亦為留客雨薇香雨李賀四月詞依微香雨青氛氳膩葉蟠花照曲門暴凍雨爾雅暴雨謂之涷郭璞注云江東呼夏月暴雨為涷雨離騷經云令飄風兮先驅使涷雨兮灑塵涷音朿海颶風南越志熙安間多颶風颶風者具四方之風也常以五月六月發未至時雞犬為之不鳴國史補云南海有颶風四面而至倒屋拔木每數年一至鄭熊番禺雜記云颶風將發有微風細雨先緩後急謂之鍊風又有石尤亦此之類韓文公詩云雷威固已加颶勢仍相借又云颶風有時作掀簸真差事又云峽山逢颶風雷電助撞捽颶音具落梅花風俗通五月有落梅風江南以為信風李白詩云天長信風吹日出宿霧散黃雀風風土記南中六月則有東南長風至時海魚化為黃雀故俗名黃雀風麥黃水水衡記黃河水四月名麥黃水苽蔓水水衡記黃河水五月名苽蔓水苽生蔓也東坡詩云河水眇綿苽蔓流礬山水水衡記黃河水六月名礬山水麥熟秋月令章句百穀各以初生為春熟為秋故麥以孟夏為秋山谷詩云生物趨功日夜流園林才夏麥先秋趙師民詩云麥秋晨氣潤槐夏午陰涼分龍節圖經池州俗以五月二十九三十日為分龍節雨則多大水閩人以夏至後為分龍雨各有方龍生日嶽陽風土記五月十三日謂之龍生日栽竹多茂盛又前輩作蒼筠傳曰筠每歲惟五月十三日獨醉或為人迎置它處不知也當時諺曰此君經歲常清齊一日不齊醉如泥有時倒載過晉地茫然乘墜俱不知宋子京種竹詩云除地牆陰植翠筠疏枝茂葉與時新賴逢醉日終無損正似德全于酒人晏元獻公詩云竹醉人還醉蠶眠我亦眠又云苒苒渭濱族蕭蕭塵外姿如能樂封植何必醉中移又東坡詩云竹是當年醉日栽竹迷日筍譜民間說竹有生日即五月十三移竹宜用此日或陰雨土虛則鞭行明年筍篁交至一云竹迷日栽竹年年生筍劉延世竹迷日種竹詩云梅蒸方過有餘潤竹醉由來自古云掘地聊栽數竿玉開簾還當一溪雲然則竹迷亦正此日也陳簡齊種竹詩云何須俟迷日可笑世俗情櫻筍廚唐輦下歲時記四月十五日自堂廚至百司廚通謂之櫻筍廚又韓偓櫻桃詩注云秦中以三月為櫻筍時陳后山詩云春事無多櫻筍來又古詞云水竹舊院落櫻筍新蔬果臨水宴因話録李少師與賓僚飲宴暑月臨水以荷為杯滿酌密繫持近人口以筯刺之不盡則重飲宴罷有人言昨飲大歡者公曰今日言歡則明日之不歡無論好惡一不得言霹靂酒醉鄉日月暑月候大雷霆時收雨水淗米炊飯釀酒名曰霹靂酒寒筵冰醉鄉日月盛夏初夏於井側安鑊以大水晶一塊大如拳無瑕釁者以新汲水熾火煮千沸取越瓶口小腹大者滿盛其湯以油帛密封口勿令泄氣復以重湯煮千沸急沉井底平旦出之破瓶冰已結矣名寒筵冰又見杜陽雜編壬癸席河東備録申王取豬毛刷淨命工織以為席清而且涼號曰壬癸席澄水帛杜陽雜編同昌公主一日大會暑氣將甚公主令取澄水帛以水蘸之掛於高軒滿座皆思挾纊澄水帛長八九尺似布而細明薄可鑒云其中有龍涎故能消暑冰絲裀樂府雜録唐老子本長安富家子生計蕩盡遇老嫗持舊裀以半千獲之有波斯人見之乃曰此是冰蠶絲所織暑月置於座滿室清涼即酬萬金消涼珠拾遺記黑蚌珠千年一生燕昭王常懷此珠當盛暑之月體自清涼名消暑招涼之珠辟暑犀提要録唐文宗夏月延學士講易賜辟暑犀章簡公端午帖子云己持犀辟暑更門草迎涼迎涼草杜陽雜編李輔國夏於堂中設迎涼草其色類碧而幹似苦竹葉細如杉雖若乾枯而未嘗雕落盛暑朿之窗戶間則涼風自至白龍皮劇談録李德常夏日邀同列及朝士宴時畏景赤曦咸有鬱蒸之苦既延入小齊列坐開樽煩暑都盡飆風涼洌如涉高秋及昏而罷出戶則大雲烈日熇然焦灼有好事者求親信問之云此日以金盆貯水漬白龍皮置於座末龍皮者新羅僧得之海中犀如意楊妃外傳唐元宗夏月授楊妃卻暑犀如意灑皮扇開元遺事王元寶都中巨豪也家有皮扇制作甚精寶每暑月宴客即以此扇置於座前以新水灑之則飆然風生酒筵之間客有寒色遂命撤去明皇亦曾差中使取看愛而不受曰此龍皮扇也服丸散抱朴子曰或問不熱之道曰服玄冰丸飛雪散王仲都等用此方也劉孝威苦暑詩云元冰術難驗赤道漏猶長環爐火桓子新論元帝被病廣求方士漢中逸人王伸都者詔問所能為對曰但能忍寒暑耳因為待詔至夏大暑日使暴坐又環以十爐火不言熱而身汗不出入寒泉括地圖天毒國最大暑熱夏草木皆乾死民善沒水以避日遇暑時常入寒泉之下激涼風唐書拂林國盛暑之節乃引水潛流上通於屋宇機制於巧匠人莫之知觀者唯於屋上聞泉鳴俄見四檐飛溜懸波如瀑激氣成涼風沒水底抱朴子葛洪從祖仙公每大醉及夏天盛熱輒入水底八日乃出正以能閉氣胎息耳開七井云林異景志霍仙鳴別墅在龍門一室之中開七井皆以雕鏤盤覆之夏月坐其上七井生涼不知暑氣乘小駟開元雜記玄宗幸洛至繡嶺宮時屬炎暑上曰姚崇多計令力士探之回奏曰崇方袗絺乘小駟按轡木陰上乃命駟頓忘繁溽臥北窗晉書陶潛字淵明諡靖節先生嘗言夏月虛間高臥北窗之下清風颷至自謂羲皇上人東坡詩云一枕清風值萬錢無人肯買北窗眠又云只應陶靖節會買北窗眠又云北窗仙人臥羲軒又云北窗高臥等羲炎書新裙南史羊欣字敬元長於隸書父不疑為烏程令欣時十五王獻之為吳興守甚知愛之嘗夏月入縣欣著新練裙晝寢獻之書裙數幅而去欣本攻書因此彌善東坡詩云載酒無人歌子云掩門晝臥客書裙翟公遜睡鄉賦云客書裙而滿幅作夏課南部新書長安舉子落第者六月後不出謂之過夏多借清淨廟院作文章曰夏課時語曰槐花黃舉子忙又見秦中記遁齊間覽云謂槐之方花乃進士赴舉之日也唐翁承贊詩云雨中裝點望中黃勾引蟬聲送夕陽憶得當年隨計吏馬蹄終日為君忙又稼軒詞云明年此日青云路卻笑人間舉子忙逐樹陰北齊書僕射魏收字伯起初習武不成改節讀書夏日坐板床隨逐樹陰諷讀纍年床為之鋭遂工辭令也練螢囊晉陽秋車胤字武子家貧讀書不常得油夏月則以練囊盛數十螢以夜繼日頒冰雪止戈集長安冰雪至夏月則價等金璧每頒冰雪論筐不復償價日日如是賜朱櫻唐史李適為學士見天子饗會遊豫唯宰相及學士得從夏宴蒲萄園賜朱櫻獻雪瓜唐列傳明崇儼以奇技自名高宗召見甚悅盛夏帝思瓜崇儼坐頃取以進自云往陰山取之四月帝憶瓜崇儼索百錢須臾以瓜獻曰得之緱氏老人圃中帝召老人問故曰埋一瓜失之土中得百錢沈瓜李魏文帝與吳質書浮甘瓜于清泉沉朱李于寒水杜詩云翠瓜碧李沉玉甃注云玉甃井也賦杞菊提要録陸龜蒙自號天隨子常食杞菊及夏月枝葉老硬氣味苦澀猶食不已因作杞菊賦以自廣云爾杞未棘爾菊未莎其如余何東坡詩云飢寒天隨子杞菊自擷芼調寢餗攝生月令四月為乾萬物以成天地化生勿冒極熱勿大汗後當風勿暴露星宿以成惡疾勿食大蒜勿食生薤勿食雞肉蛇蟺是月肝藏以病祌氣不行火氣漸臨水力漸衰稍補腎助肝調和胃氣無失其時埋蠶沙河圖四月收蠶沙於宅內亥地埋之令人大富得蠶又甲子日以一碩三㪷鎮宅令家財千萬求蛇醫蛇醫即蜥蜴也酉陽雜俎王彥威鎮汴地之二年夏旱季玘過汴因以旱為言季醉曰欲雨甚易可求蛇醫四頭石甕二枚每甕實水浮二蛇醫以木為蓋密泥之置于間處甕前後設席燒香選小兒十歲以下十餘人令執小青竹晝夜更擊其甕不得少輟王如其言試之一日兩夜雨大注數百里舊說龍與蛇醫為親家焉又張師正倦遊録云熙寧中京師久旱按古法令坊巷以甕貯水插柳枝泛蜥蜴小兒呼曰蜥蜴蜥蜴興云吐霧降雨滂沱放汝歸去翰府名談云宋內翰祁鎮鄭州夏旱公文祭蜥蜴於祈所即時大雨告足民乃有秋東坡詩云甕中蜥蜴為可笑占蝗旱四時纂要四時辰雨皆為蝗蟲大雨大蟲小雨小蟲二日雨百草旱五穀不成三日雨小旱風從西來麻吉四日雨五穀貴五日六日雨有旱處四日至七日風者大豆吉八日微雨熟俗云八日雨斑闌高低田可憐此月自一日至十四日惡風者皆不可種豆
