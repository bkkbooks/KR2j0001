body:
  text: 首卷月令主屬大全圖禮記月令注云仲春之月盛德在木故所主皆木屬也仲夏之月盛德在火故所主皆火屬也仲秋之月盛德在金故所主皆金屬也仲冬之月盛德在水故所主皆水屬也惟土居中央而分旺四時故所主皆土屬也梁元帝纂要春曰青陽氣清而溫陽亦曰發生芳春青春陽春三春九春天曰蒼天萬物蒼蒼而生風曰陽風春風暄風柔風惠風景曰媚景和景韶景時曰良時嘉時芳時辰曰良辰嘉辰芳辰節曰嘉節韶節淑節草曰芳草弱草芳卉木曰華木華樹芳樹陽樹林曰茂林芳林鳥曰陽鳥時鳥候鳥好鳥禽曰陽禽時禽好禽夏曰朱明氣赤而光明亦曰長贏朱夏炎夏三夏九夏天曰昊天言氣浩汗風曰炎風節曰炎節草曰茂草雜草木曰蔚林茂林密樹茂樹秋曰自藏氣自而收藏萬物亦曰收成萬物成而皆收斂三秋九秋素秋素商高商天曰旻天旻憫也憫萬物之凋零風曰商風素風凄風高風涼風悲風激風清風景曰朗景澄景清景時曰凄辰霜辰節曰素節嘉節草曰衰草木曰疏木衰林霜柯冬曰玄英氣黑而清英三冬九冬天曰上天言時無事在上臨下風曰寒風勁風嚴風厲風哀風陰風景曰冬景寒景時曰寒辰節曰嚴節鳥曰寒鳥寒禽草曰寒卉黃草木曰寒木寒柯素木寒條爾雅歲陽爾雅疏釋曰此別太陽在日在辰之名也甲至癸為十日日為陽寅至丑為十二辰辰為陰漢書律歷志乃以前歷上元泰初四千六百一十七歲至元封七年復得閼逢攝提格之歲中冬孟康曰言復得者上元泰初時亦是閼逢之歲歲在甲曰閼逢在寅曰攝提格此謂甲寅之歲也然則乙歲名之圖卯之歲曰旃蒙單閼丙辰之歲曰柔兆執徐丁巳之歲曰疆圉大荒落戊午之歲曰著雍敦牂巳未之歲曰屠維協洽庚申之歲曰上章涒灘辛酉之歲曰重光作噩壬戌之歲曰元黓閹茂癸亥之歲曰昭陽大淵獻甲子之歲曰閼逢困敦乙丑之歲曰旃蒙赤奮若推此周而復始可知也爾雅月陽爾雅疏釋此乃辨以日配月之名設若正月得甲曰畢陬二月得乙曰橘如三月得丙曰修丙四月得丁曰圉余五月得戊曰厲皋六月得己曰則且七月得庚曰窒相八月得辛曰塞壯九月得壬曰終玄十月得癸曰極陽十一月得甲曰畢辜十二月得乙曰橘涂周而復始抑又可知也月名之圖容齋隨筆太史公歷書以閼逢為焉逢旃蒙為端蒙柔兆為游兆疆圉為疆梧著雍為徒維屠唯為祝犁上章為商橫重光為昭陽元弋為橫艾昭陽為尚章大荒落為大芒落協洽為汁洽涒灘為赤奮若作噩為作鄂閹茂為淹茂大淵獻與困敦更互赤奮若乃為芮漢此年久傳說不必深辨氣候循環易見圖尚書正義曰節氣者周天三百六十五日四分日之一分為十二月則月各得二十日十六分日之七以初為節氣半為中氣故一歲有二十四氣分居辰次焉董巴議曰伏犧造八卦作三劃以象二十四氣一行卦候驗曰七十二候原于周公較諸月令頗有增損然后先之次則同自后魏始載于歷乃依易軌所傳不合經義令改從古凡五日為候三候為氣六氣成時四時成歲日出日沒永短之圖淮南子曰日出于暘谷浴于咸池拂于扶桑是謂晨明登于扶桑之上東方之野爰始將行是謂朏明謂將明也至于曲阿曲阿山名是謂朝明臨于曾泉東方多水之地是謂早食次于桑野是謂晏食臻于衡陽是謂禺中對于昆吾昆吾邱在南方是謂正中靡于鳥次西南方之山名是謂小遷至于悲谷悲谷西北方之山名是謂脯時回于女紀西方陰地是謂大遷經于泉隅是謂高舂頓于連石西方山名是謂下舂爰止義和爰息六螭是謂懸車薄于虞泉是謂黃昏淪于蒙谷是謂定昏梁元帝纂要云日光曰景日影曰晷日初出曰旭日昕曰曦在午曰亭午在未曰迭日晚曰旰日西落反照于東景在上曰反景在下曰倒景月生月盡盈虧之圖爾雅釋名曰月闕也言滿則復缺也朏音斐月未成明也魄月始生魄然也承大月生二日謂之魄承小月生三日謂之朏朔月初之名也朔蘇也月死復蘇生也晦月盡之名也晦灰也死為灰月光盡似之也弦月半之名也其形一旁曲一旁直若張弓弦也望月滿之名也日月遙相望也尚書武成日惟一月壬辰旁死魄旁近也旁死日近死魄又曰厥四月哉生明哉始也月三日始生明又曰既生魄魄生明死十五之后又大傳曰晦而月見西方謂之朓他了切朔而月見東方謂之朒女六切五經通義曰月中有兔與蟾蜍何兔陰也蟾蜍陽也而與兔并明陰系陽也經星昏明迭見之圖堯典疏曰二十八宿隨天轉運更互在南每月各有中者洪范四曰星辰注云二十八宿迭見以敘節氣疏云二十八宿昏明迭見若月令十二月皆紀昏旦所中之星所以敘節氣也隋書天文志云庖犧氏仰觀俯察以天之二十八宿周于圓穹之度以麗十二位也隨天而轉謂之經星堯典四仲迭見之星則午為正月令昏旦迭見之星則以未為中蓋星之運始則見于辰終則伏于戍自辰至戌正于午而中于未故堯典言日永星火以正仲夏是以午為正也月令至于季夏乃曰昏火中則是以未為中左傳曰火星中而寒暑退詩曰定之方中亦皆以未中也閏月成歲為章之圖先王體元以居正順時以授民是必迎日以推策之啟閉以為節分至以為中推閏定時以成歲以周天之數考之三百六十五度四分度之一日之行也一日經一度一年則余五度四分度之一小月又余六度則每歲日行于天余十有一度四分度之一是余十有一日四分日之一也三年即余三十三日四分日之三三年一閏而余三日四分日之三五歲再閏而少三日四分日之三十九年七閏謂之一章總余二百一十三日四分日之三七閏計二百十一日尚余三日四分日之三積至八十一章然后盈虛之數終而復始矣玉衡隨炁指建圖孝經緯大雪后玉衡指子冬至指癸小寒指丑大寒指艮立春指寅雨水指甲驚蟄指卯春分指乙清明指辰谷雨指丙立夏指巳小滿指巽芒種指午夏至指丁小暑指未大暑指坤立秋指戊處暑指庚白露指酉秋分指辛寒露指戌霜降指乾立冬指亥小雪指壬大雪漢志云玉衡北斗也招搖逐月推移圖淮南子孟春招搖指寅仲春指卯季春指辰孟夏指已仲夏指午季夏指未孟秋指中仲秋指酉季秋指戌孟冬指亥仲冬指子季冬指丑漢志云閏月無中炁斗余指雨辰之間漢晉志云北斗七政之樞機陰陽之本元運乎天中而臨制四方以建四時輔星傳乎闓陽所以佐斗而成功者也日月次舍交會圖堯典曰歷象日月星辰敬授人時注云日月所會歷象其分節是謂日月交會于十二次也左傳云日月之會是謂辰月令注云日月之行一歲十二會蓋周天三百六十五度四分度之一日行遲一日經一度一歲一周天月行速一日經十三度一月一周天更行二十九日半方與日相會也陰陽變合消長圖太玄經子則陽生于十一月陰終于十月午則陰生于五月陽終于四月觀此則乾坤消息可見矣陽生于子而終于已故乾為四月之卦陰生于午而終于亥故坤為十月之卦蓋陰不極則陽不生故先坤而后復陽不極則陰不萌故先乾而后姤余皆以意推之則陰陽消長之理又可知矣律管淺深候氣圖隋天文志候氣之法先治一室令地極平乃埋列管皆使上齊入地有淺深各從其方位排列以葭莩灰實管中候之氣至則一律飛灰假如冬至陽氣距地面九寸而至惟黃鐘一管達之故黃鐘為之應正月距地面八寸止自太簇以上皆達黃鐘大呂皆已虛故惟太簇一律飛灰余皆仿此律呂損益相生圖荊璞集曰律以統氣類物呂以旅陽宣氣律呂者氣候之管也以銅為之某月氣至則某律為應焉應謂吹葭灰也然必隔八相生而又始于黃鐘之九寸而黃復始于十一月者蓋物以三成聲以五立以三參五而八數成矣人以八尺而為尋物以八竅而卵生故十二律之音皆隔八而成焉
