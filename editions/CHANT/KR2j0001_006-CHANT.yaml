body:
  text: 卷第四冬禮記鄉飲酒曰北方曰冬冬之為言中也中者藏也管子曰冬者陰之畢下伏萬物尸子曰冬為信淮南子云冬為權權者所以權萬物也權正而不失萬物乃藏前漢律歷志曰大陰者北方北伏也陽炁伏於下於時為冬冬終也物終藏乃可稱水潤下智者謀謀者重故為權也又月令冬三月其日壬癸其帝顓頊其神玄冥其蟲介其音羽其數六其味醎其臭朽其祀行祭先腎孟冬月禮記月令曰孟冬之月日在尾昏危中旦七星中律中應鍾水始冰地始凍雉人大水為蜃虹藏不見天氣上騰地氣下降天地不通閉塞而成冬孝經緯曰霜降後十五日斗指乾為立冬後十五日斗指亥為小雪三統歷曰立冬為十月節小雪為十月中氣小雪大雪者以霜雨凝結而雪十月猶小十一月轉大周書時訓曰立冬之日水始冰後五日地始凍後五日雉入大水為蜃小雪之日虹藏不見後五日天氣上騰地氣下降後五日閉塞而成冬白虎通德論曰十月律謂之應鍾何鍾動也言萬物應陽而動下藏也晉樂志云十月之辰謂之亥亥者劾也言時陰氣劾殺萬物也夏小正曰十月黑鳥浴黑鳥烏也浴也者謂飛乍上乍下也詩七月曰十月隕籜又曰十月蟋蟀入我床下又曰十月穫稻又曰十月納禾稼又曰十月滌場左傳莊公十六年公父定叔使以十月入曰良月也就盈數焉西京雜記曰陰德用事則和氣皆陰建亥之月是也故謂之正陰之月又曰十月陰雖用事而陰不孤立此月純陰疑於無陽故亦謂之陽月歐陽公詞曰十月小春梅蘂綻纂要曰十月曰上冬月令曰孟冬行春令則凍閉不密地氣上泄民多流亡行夏令則國多暴風方冬不寒蟄蟲復出行秋令則霜雪不時小兵時起土地侵削仲冬月月令曰仲冬之月日在斗昏東壁中旦軫中律中黃鍾冰益壯地始圻鶡旦不鳴虎始交蕓始生荔挺出蚯蚓結麋角解水泉動孝經緯曰小雪後十五日斗指壬為大雪後十五日斗指子為冬至三統歷曰大雪為十一月節至為十一月中氣周書時訓曰大雪之日鶡旦不鳴後五日虎始交後五日荔挺出冬至之日蚯蚓結後五日麋角解後五日小泉動白虎通德論曰十一月律謂之黃鍾何黃中和之色鍾者動也言陽氣動於黃泉之下動養萬物也晉樂志曰十一月辰謂之子子者孳也言陽氣至此更孳生也夏小正曰十一月王狩言王狩之時也冬獵為狩呂氏春秋曰仲冬命之曰暢月注云暢充也月令曰仲冬行夏令則其國乃旱氛霧冥冥雷乃發聲行秋令則天時雨汁瓜瓠不成國有大兵行春令則蝗蟲為敗水泉咸竭民多疥癘季冬月月令曰季冬之月日在婺女昏婁中旦氐中律中大呂雁北鄉鵲始巢雉雊雞乳征鳥厲疾冰方盛水澤腹堅日窮於次月窮于紀星回於天數將幾終歲且更始孝經緯曰冬至後十五日斗指癸為小寒後十五日斗指丑為大寒三統曆曰小寒為十二月節大寒為十二月中氣小寒大寒者十二月極寒之時相對為大小月初為小寒月半為大寒也周書時訓曰小寒之日雁北鄉又後五日鵲始巢又五日雉始雊雁不北向民不懷主鵲不始巢一國不甯雉不始雊國乃大水大寒之日雞始乳又五日鷙鳥厲疾又五日水澤腹堅雞不始乳淫女亂男鷙鳥不厲國不除兵水澤不腹堅言乃不從白虎通德論曰十二月律謂之大呂何大大也呂者拒也言陽氣欲出陰不許也呂之為言拒者旅抑拒難之也晉樂志曰十二月之辰謂之丑丑者紐也言終始之際故以紐結為名也夏小正曰十二月玄駒賁玄駒蟻也賁者走於地中也纂要曰十二月曰暮冬亦曰抄冬涂月暮節暮歲窮稔窮紀月令曰季冬行秋令則白露蚤降介蟲為妖四鄙入保行春令則胎夭多傷國多固疾命之曰逆行夏令則水潦敗國時雪不降冰凍消釋一色雲韓詩外傳凡草木花多五出雪花獨六出雪花曰霙雪雲曰同雲同謂雲陰與天同為一色也故詩云上天同雲雨雪雰雰一丈凍郭義恭廣記北方地寒冰厚三尺地凍一丈千里雪楚詞層冰峨峨飛雪千里王逸注云北極常寒也東坡詩云峨眉山西雪千里謝燮雨雪曲云峨峨六尺冰飄飄千里雪千年冰杜陽雜編順宗即位年拘弭國貢常堅冰云其國有大凝山其中有冰千年不釋及齎至京師潔冷如故雖盛暑赭日終不消嚼之與中國冰凍無異又神異經云北方有層冰萬里厚百丈尸子曰朔方之寒冰厚六尺北極左右有不釋之冰漢五行志云元和間瑯邪井冰厚丈餘紺碧霜拾遺記廣延國霜色紺碧又云嵰州霜甘也漢武帝內傳曰仙家上藥有玄霜紺雪入液雨瑣事錄閩俗立冬後過壬日謂之入液至小雪出液得雨謂之液雨無雨則主來年旱諺云液雨不流籜高田不要作又謂之藥雨百蟲飲此水而蟄林公弁詩云液雨初生小院寒復槽水水衡記黃河水十月名復槽水落復故道也蹙凌水水衡記黃河水十一月十二月名蹙凌水冰斷復結蹙起成層也寶硯爐天寶遺事內庫有七寶硯爐一所曲盡其巧每冬寒硯凍置於爐上硯冰自消不勞置火冬月帝用之煖玉鞍天寶遺事岐王有玉鞍一面每至冬月則用之雖天氣寒嚴此鞍在座下如有溫火之氣煖金合裴鉶傳奇進士張無頗過袁天罡女袁大孃受藥以煖金合盛之曰寒時值出此合則一室暄熱不假爐炭矣合乃廣利王宮中之寶卻寒簾杜陽雜編咸通九年同昌公主下降賜錢五百萬貫仍罄內庫寶貨以實其宅更賜金麥銀米數斛堂設連珠之帳續真珠以成也卻寒之簾類玳瑁班有紫色云卻寒鳥骨所為也則未知出何國卻寒犀杜陽雜編同昌公主堂中設卻寒犀又綴五色香囊貯辟寒香前輩詩云辟寒犀外凍雲平禦寒毬提要錄大祖登極九州各貢方物燕國劉大王守光使進禦寒毬一床辟寒金古今詩話嗽寒鳥出崑明國形如雀色黃魏明帝時其國來獻飼以真珠及兔腦常吐金屑如粟宮人爭取為釵鈿名之辟寒金此鳥不畏寒也宮人相嘲曰不取辟寒金那得帝王心不服辟寒鈿那得帝王憐古樂府云誰似辟寒金聊借與空床煖辟寒香述異記漢武帝時外國貢辟寒香室中焚之雖大寒必減衣衣狐裘呂氏春秋曰衛靈公天寒鑿池言不寒宛春曰君衣狐裘坐熊席四隅有火所以不寒設羆褥拾遺記周靈王起昆昭之臺設狐腋素裘紫羆文褥一人以指彈席上而暄風入室裘褥皆棄臺下捏鳳炭天寶遺事楊國忠以炭屑用蜜捏塑成雙鳳至冬至日則熖於爐中及先以白檀木鋪于爐底餘灰不許參雜置鳳木杜陽編李輔國嚴凝之時置鳳首木于高堂大廈中其木高一尺而雕刻如鸞鳳之形和煦之氣如二三月故別名常春木呵牙筆天寶遺事李白嘗于便殿對明皇撰詔誥時十月大寒筆凍莫能書字帝敕宮嬪十人侍於李白左右令冬各執牙筆呵之白遂取而書詔李白之受聖睠也如此之厚得玉馬臧榮緒續晉書新蔡王騰發于并州常山之真定縣遇天大雪平地數丈融不積騰發怪而掘之得玉馬高尺許上表獻之藜藿野人立春詩云玉馬自能消朔雪土牛更為發春風炷煖香雲林異景志寶雲溪有僧舍盛冬若客至不燃薪火煖香一炷滿室如春詹克愛題西山禪房詩云煖香炷罷春生室始信壺中別有天吐氣火葛仙翁別傳公與客談話時天寒仙翁謂客曰居貧不能人人得爐火請作一大火共致煖者仙公因吐氣火從口中出須臾火滿室客皆熱脫衣也煮建茗開元遺事逸人王休居太白山下日與僧道異人往還每至冬日取冰敲其精瑩者煮建茗以供賓客飲之飲羔酒提要錄世傳陶穀學士買得黨太尉家故妓遇雪陶取雪水烹團茶謂妓曰黨家應不識此妓曰彼粗人安有此景但能于銷金帳下淺酌低唱飲羊羔酒耳陶默然愧其言東坡詩云試問高吟三十韻何如低唱兩三杯作妓圍天寶遺事申王每冬月苦寒之際令宮女密圍於坐側以禦寒氣謂之妓圍揣妓肌天寶遺事岐王每冬寒手冷不近火惟于妙妓懷中揣其肌膚為之煖手選肉陣開元遺事楊國忠選婢妾肥大者行列於前令遮風謂之肉陣煖寒會開元遺事巨豪王元寶每冬月大雪之時令僕夫掃雪為徑躬立坊前迎揖賓客具酒炙宴之為煖寒會送臘粥皇朝東京夢華錄十二月都城賣散佛花至初八日有僧尼三五為群以盆盛金銅佛像浸以香水楊柳灑浴排門教化諸大寺作浴佛會并送七寶五味粥謂之臘八粥都人是日亦以果子雜料煮粥而食省尞火前漢書冬民既入婦人同巷相從夜續一月得四十五日以省尞火同巧拙而合習俗也尞力召反溫母席搜神記羅威字德行少喪父事母至孝母年七十天大寒常以身自溫席而後授其母煖母枕東觀漢記黃香字文疆江夏安陸人事母至孝每冬寒則身煖枕席夏則扇之使涼東坡詩云願子聚為江夏枕不勞揮扇自甯親扣冰魚孝子傳王祥少有德行事後母至孝盛寒冰凍網罟不施母欲生魚祥解褐扣冰求之忽冰開有雙魚躍出祥獲以奉母時人謂之至孝所致黃民本後章云臥冰泣竹慰母心號林笋楚國先賢傳左臺御史孟宗事後母至孝母性嗜筍及母亡冬節至宗入林哀號而筍生以供祭祀杜甫詩云遠傳冬筍味更覺綵衣春問歲餘魏略董遇好學人從學者遇不肯教云當先讀書百遍而義自見學者云苦暇無日遇曰當以三餘或問三餘之意遇曰冬者歲之餘夜者日之餘閏者月之餘又見任彥升策山谷詩云皇文開萬卷家學陋三餘東坡詩云酒飽高眠真事業此生有味在三餘足文史漢書方朔自言年十三學三冬文史足用注云貧子冬日乃得學
