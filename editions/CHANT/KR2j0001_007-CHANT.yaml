body:
  text: 卷第五元旦上以上缺時之禮也故於此日採椒花以獻尊者古詞云金縷探聽春來處又云佳人重勸千長壽柏葉椒花分翠袖屠蘇散歲華紀麗俗說屠蘇者草庵之名也昔有人居草庵之中每歲除夕遺里閭藥一貼令囊浸井中至元日取水置於酒樽合家飲之不病瘟疫今人得其方而不識名但曰屠蘇而已孫真人屠蘇飲論云屠者言其屠絕鬼炁蘇者言其蘇省人魂其方用藥八品合而為劑故亦名八神散大黃蜀椒桔梗桂心防風各半兩白朮虎杖各一分烏頭半分咬咀以絳囊貯之除日薄暮懸井中令至泥正旦出之和囊浸酒中頃時捧杯呪之曰一人飲之一家無疾一家飲之一里無病先少後長東向進飲取其滓懸於中門以辟瘟氣三日外棄於井中此軒轅黃帝神方李漢老詞云一年適盡蓮花漏翠井屠蘇沉凍酒洪舍人邁容齋續筆云今人元日飲屠蘇自小者起相傳已久然固有來處後漢李膺杜密以黨人同繫獄值元日於獄中飲酒曰正旦從小起時鏡新書晉董勛云正旦飲酒先飲小者何也勛曰俗以小者得歲故先酒賀之老者失歲故後飲殿之初學記載四人月令云正旦進酒次第當從小起以年小者起唐劉夢得白樂天元日舉酒賦詩劉云與君同甲子壽酒讓先杯白云與君同甲子歲酒合誰先白又有歲假內命酒一篇云歲酒先拈辭不得被君推作少年人顧況云不覺老將春共至更悲攜手幾人全還丹寂寞羞明鏡手把屠蘇讓少年裴夷直云自知年幾偏應少先把屠蘇不讓春儻更數年逢此日還應惆悵羨他人成文幹云戴星先捧祝堯觴鏡裏堪驚兩鬢霜好是燈前偷失笑屠蘇應不得先嘗方千詩云纔酌屠蘇定年齒坐中皆笑鬢毛班然則尚矣東坡亦云但把窮愁博長健不辭最後飲屠蘇其義亦然頴濱詩云井底屠蘇浸舊方床頭冬釀壓瓊漿五辛盤風土記正元日俗人拜壽上五辛盤松柏頌椒花酒五熏煉形五辛者所以發五臟氣也正一旨要云五辛者大蒜小蒜韭菜蕓薹胡荽是也孫真人食忌云正月之節食五辛以辟癘氣孫真人養生訣云元日取五辛食之令人開五臟去伏熱衛生必用云韭性煖春食補益齊周顒隱鍾山王儉謂曰山中所食何者最勝曰春初早韭秋末晚菘庾肩吾詩云聊開柏葉酒試奠五辛盤一云五辛薑也敷于散葛洪鍊化篇敷于散用柏子仁麻仁細辛乾薑附子等分為末元日井花水服之抑陰助陽卻邪辟疫一云胡洽方彈鬼丸劉氏方彈鬼丸武都雄黃丹砂二兩合前五藥為末鎔蠟五兩和圓如彈大正旦男左女右佩之大辟邪氣又有所謂卻鬼丸唐人詩云走鹿枯風吼夜闌頌花還喜向椒盤人情此日非前日歲事新官對舊官竹葉莫辭終日醉梅花已拚隔年看書生但恐寒為祟不用朱泥卻鬼丹辟瘟丹千金方辟瘟丹皂角蒼朮降真香為末水圓如龍眼大朱砂為衣正旦五更當門焚之禳滅瘟氣膠牙餳荊楚歲時記元日食膠牙餳取膠固不動之義今北人亦如之白樂天詩云一楪膠牙餳粉荔枝金門歲節洛陽人家正旦造雞絲蠟燕粉荔枝更相餽送古詞云嘵日樓頭殘雪盡乍破臘風傳春信綵燕絲雞珠幡玉勝併歸釵鬢擘柿橘瑣碎錄京師人歲旦用盤盛柏一枝柿橘各一枚就中擘破眾分食之以為一歲百事吉之兆餐蓬餌西京雜記漢宮中正旦出池邊盥濯食蓬餌以祓除邪惡氣食索餅歲時雜記元日京師人家多食索餅所謂年飯飥者或此類服桃湯荊楚歲時記元旦服桃湯桃者五行之精能厭伏邪氣制禦百鬼又風俗通云元日飲桃湯及柏葉酒煎朮湯皇朝歲時雜記正月一日京城人皆煎朮湯以飲之并燒蒼朮以辟除疫癘之氣服𤅈豆四時纂要歲旦服赤小豆二七粒向東以𤅈汁下可終歲無疾家人悉令飲之吞鹽豉皇朝歲時雜記元旦吞鹽豉七粒可令終歲不誤食蠅子咽雞卵風俗通元日食雞子一枚以鍊形也又莊子注云正旦皆當吞生雞子一枚浴香湯雜修養書正月一日取五木湯以浴令人至老鬚髮稠黑徐鍇注云道家以青木香為五香亦名五木道家多以此為浴海錄碎事云一木五香根旃檀節沉花雞舌葉藿膠薰陸燒丁香瑣碎錄樞密王博文正旦四更燒丁香以辟瘟氣取性烈也燃爆竹神異經西方深山中有人長尺餘犯人則病寒熱名曰山臊以竹著火中熚烞有聲而山臊驚憚玄黃經云此鬼是也俗以為爆竹起於庭燎不應濫於王者又荊楚歲時記云元日庭前爆竹以辟山臊惡鬼也頴濱除日詩云楚人重歲時爆竹鳴磔磔又王荊公詩云爆竹驚鄰鬼古詞云南樓人未起爆竹聲聞應在笙歌裏又云竹爆當門庭震門陛也飾桃人山海經東海有度朔山上有大桃樹蟠屈三千里其卑枝閒東北曰鬼門萬鬼所出入也上有二神一曰神荼一曰鬱壘主閱領眾鬼之惡害人者執以葦索而用飼虎焉於是黃帝法而象之毆除畢因立桃梗於門戶之上畫鬱櫑持葦索以禦兇鬼畫虎於門當食鬼鬼也後漢禮儀志注云虎者陽物百獸之長能擊鷙鳥食魑魅者也又風俗通云黃帝上古之時有神荼鬱櫑兄弟三人性能執鬼於度朔山桃樹下簡閱百鬼之無道者縛以葦索執而飼虎是故縣官常以臘祭夕飾桃人垂葦索畫虎於門以禦兇也又括地圖云桃都山有大桃樹盤屈三千里上有金雞日照此則鳴下有二神一名鬱一名壘並執葦索以伺不祥之鬼得則殺之又玄中記云今人正朝作兩桃人立門傍以雄雞毛置索中蓋示勇也張平子東都賦云度朔作梗守以鬱壘神荼副焉對操葦索李善注云梗桃木人也畫桃梗戰國策蘇秦說孟嘗君曰土偶人語桃梗曰今子東國之桃木削子為人假以丹彩用子以當門戶之癘高誘注云東海中有山名度朔上有大桃樹其枝間東北曰鬼門下有二神人一曰余與二曰鬱靁主治害鬼故世刊此桃畫余與鬱靁正歲以置門戶號之曰桃梗後漢禮儀志注云梗者更也歲終更始受介社也或曰即黃帝立桃人之事耳插桃梧淮南子詮言訓羿死於桃梧許慎注云梧大杖也取桃為之以擊殺羿由是以死鬼畏桃今人以桃梗徑寸許長七八寸中分之書祈福禳災之辭歲旦插於門左右地而釘之即其制也寫桃版皇朝歲時雜記桃符之制以薄木版長二三尺大四五寸上畫神像狻猊白澤之屬下書左鬱壘右神荼或寫春詞或書祝禱之語歲旦則更之王介甫詩云總把新桃換舊符東坡詩云退閑擬學舊桃符造仙木玉燭寶典元日造桃版著戶謂之仙木以像鬱壘山桃樹百鬼畏之也辯荼壘藝苑雌黃荼壘之設數說不同山海經及風俗通則曰神荼鬱壘高誘注戰國又曰余與鬱壘玉燭寶典直以鬱壘為山名括地圖又分鬱壘為二而無神茶不知當以何說為是然今人正旦書桃符多用鬱壘神荼古詞云待醉裏小王書寫副神荼鬱壘繪門神荊楚歲時記歲旦繪二神披甲持鉞貼于戶之左右謂之門神又呂原明歲時雜記云除夕圖畫二神形傅于左右扉名曰門神戶尉書聻字酉陽雜俎元日俗好于門上畫虎頭書聻字謂陰司鬼名可息瘧癘也又讀書舊儀云歲旦儺逐疫鬼立桃人葦索滄耳虎頭等於門所謂滄耳者恐即聻字之訛也又宣室志云斐漸隱居伊水善洞視鬼物時有道士李君見漸於伊上寓書博陵崔公曰當今制鬼無過漸耳是時朝士咸聞漸耳之說而不審所謂竟書其字於門以辟祟癘後人效之遂至成俗貼畫雞藝苑雌黃古人以正旦畫雞于門七日貼人於帳杜公瞻注歲時記云餘日不刻牛羊狗豬馬之像而二日獨施人雞此則未喻予以意度之正旦畫雞於門謹始也七日貼人於帳重人也刻明鳥拾遺記堯在位七年祗支國獻重明鳥似鳳而小云能禳妖災或一歲數來或數歲一來國人每掃戶以望其集或以金寶刻為其狀置戶牖間則鬼類自伏今人元日刻為畫雞於戶上蓋其遺像也釘麵蛇歲時雜記京師人以麵為蛇形又以炒熟黑豆煮熟雞子三物於元日四鼓時用三姓人掘地逐件以鐵釘各釘三下呪曰蛇行則病行黑豆生則病行雞子生則病行呪畢遂掩埋之掛兔頭歲時雜記元旦取兔頭或兼用麵蛇或以竹筒盛雪水與年幡面具同掛門額斬鼠尾雜術臘月捕鼠斷其尾正月一日日未出時家長於蠶室祝曰制斷鼠蟲切不得行三祝而置之壁上永無暴鼠燒鵲巢四時纂要元旦取鵲巢燒之著廁辟兵極效取古磚陳藏器拾遺云正月朝早將物去塚頭取古磚一口禱呪要斷一年無時瘟懸安大門也鏤色土易通卦驗正旦五更整衣冠於家庭中燃爆竹帖畫雞或鏤五色土於戶上厭不祥也造華勝董勛答問禮俗正月一日造華勝以相遺像瑞圖金勝之形賈充李夫人典誡曰每見時人月旦花勝交相遺與謂正月旦也李漢老元旦詞云又喜椒觴到手寶勝裏仍翦金花東坡元日詩云蕭索東風雨鬢華年年幡勝剪宮花又云勝裏金花巧耐寒剪年幡皇朝歲時雜記元旦以鴉青紙或青絹剪四十九幡圍一大幡或以家長年齡戴之或貼于門楣仲殊元日詞云椒觴獻壽瑤觴滿綵幡兒輕輕剪又云柏觴瀲灩銀幡小懸葦索荊楚歲時記元日懸葦索桃棒於門戶上海錄碎事云南陽葦杖用劉寬蒲鞭事韓詩外傳曰老蒲為葦投麻豆雜五時書正旦及上元日以赤豆麻子二七粒置井中辟瘟癘甚效折松枝董勛答問禮俗歲首祝椒酒飲畢又折松枝於戶男一七女二七亦同此義取楊柳蘇氏演義正旦取楊柳枝著戶百鬼不入家照桑果齊民要術正旦雞鳴時把火遍照五果及桑樹上下則無蟲時年有桑果災生蟲者元旦照之免災嫁棗李四時纂要元旦日未出時以斧斑駁錐斫棗李等樹則子繁而不落謂之嫁樹晦日同嫁李則以石安樹間採款花本草圖經款冬花生於冰下十二月正月旦採之傅咸款冬賦序曰余曾逐禽登北山于時中冬冰凌盈谷積雪被崖顧見款冬花煒然始敷華艷當是正於冰下為花也主欬逆古今方用之忌針綫歲時雜記京人元日皆忌針綫之工故諺有嬾婦思正月饞婦思寒食之語治酒食李晟傳正歲崔氏女婦甯晟曰爾有家而姑在堂當治酒食以待賓客即卻之不得進祝富貴唐文粹元稹元旦詩云富貴祝來何所遂聰明鞭得轉無機稹自汪云祝富貴鞭聰明皆正旦童稚語穰長短歲時雜記小兒生太短者元日五鼓就廁傍偃臥從足倒曳跬步許太長者以木杴拍其頭賣懞懂歲時雜記元日五更初猛呼他人他人應之即告之曰賣與爾懞懂賣口吃亦然呼畜類五行書元日向晨至門前呼牛馬雜畜令來仍置粟豆於灰散之宅內云可以招牛馬未知所出驗牛臥玉堂閑話正月一日於牛屋下驗牛俱臥則五穀難生苗半臥半起歲中平牛若俱立則五穀大熟
