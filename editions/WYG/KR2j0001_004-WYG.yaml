body:
  text: 嵗時廣記卷四宋陳元靚撰冬禮記鄉飲酒曰北方曰冬冬之為言中也中者藏也管子曰冬者隂氣畢下故萬物成尸子曰冬為信淮南子曰冬為權權者所以權萬物也權正而不失萬物乃藏前漢律厯志曰大隂者北方北伏也陽氣伏於下於時為冬冬終也物終藏乃可稱水潤下智者謀謀者重故為權也又月令曰冬三月其日壬癸其帝顓頊其神𤣥㝠其蟲介其音羽其數𤣥其味鹹其臭朽其祀行祭先腎孟冬月禮記月令曰孟冬之月日在尾昬危中旦七星中律中應鍾水始氷地始凍雉入大水為蜃虹藏不見天氣上騰地氣下降天地不通閉塞而成冬孝經緯曰霜降後十五日斗指乾為立冬後十五日斗指亥為小雪三統厯曰立冬為十月節小雪為十月中氣小雪大雪者以霜雨凝結而雪十月猶小十一月轉大周書時訓曰立冬之日水始氷後五日地始凍後五日雉入大水小雪之日虹藏不見後五日閉塞而成冬白虎通徳論曰十月律謂之應鍾何鍾動也言萬物應陽而動下藏也晉樂志曰十月之辰謂為亥亥者劾也言時隂氣劾殺萬物也夏小正曰十月黑鳥浴黒鳥烏也浴也者謂飛乍上乍下也詩七月十月隕蘀又曰十月蟋蟀入我牀下又曰十月穫稻又曰十月納禾稼又曰十月滌場左傳莊公十六年公父定叔出奔衛三年而復之使以十月入曰良月也就盈數焉西京雜記曰隂徳用事則和氣皆隂建亥之月是也故謂之正隂之月又曰四月陽雖用事而陽獨不存此月純陽疑於無隂故亦謂之隂月歐陽公詞云十月小春梅蘂綻纂要曰十月曰上冬月令曰孟冬行春令則凍閉不宻地氣上泄民多流亡行夏令則國多暴風方冬不寒蟄蟲復出行秋令則霜雪不時小兵時起土地侵削仲冬月月令曰仲冬之月日在斗昏東壁中旦軫中律中黄鍾氷益壯地始坼鶡旦不鳴虎始交芒始生荔挺出蚯蚓結麋角解水泉動孝經緯曰小雪後十五日斗指壬為大雪後十五日斗指子為冬至三統厯曰大雪為十一月節冬至為十一月中氣周書時訓曰大雪之日鶡鳥不鳴後五日虎始交後五日荔挺出冬至之日蚯蚓結後五日麋角解後五日水泉動白虎通徳論曰十一月律謂之黄鍾何黄中和之色也鍾動也言陽氣動於黄泉之下動養萬物也晉樂志曰十一月之辰謂之子子者孳也謂陽氣至此更孳生也夏小正曰十一月王狩言王狩之時也冬獵為狩吕氏春秋曰仲冬命之曰暢月注云暢充也月令曰仲冬行夏令則其國乃旱氛霧𠖇𠖇雷乃𤼵聲行秋令則天時雨汁瓜瓠不成國有大兵行春令則蝗蟲為敗水泉咸竭民多疥癘季冬月月令曰季冬之月日在婺女昏婁中旦氐中律中大吕雁北鄉鵲始巢雉鴝雞乳征鳥厲疾氷方盛水澤腹堅日窮於次月窮於紀星迴於天數將幾終歳且更始孝經緯曰冬至後十五日斗指癸為小寒後十五日斗指丑為大寒三統厯曰小寒為十二月節大寒為十二月中氣小寒大寒者十二月極寒之時相對為大小月初寒為小月半寒為大周書時訓曰小寒之日雁北嚮又五日鵲始巢又五日雉始雊雁不北嚮民不懷生鵲不始巢國不安寧雉不始雊國乃大水大寒之日雞始乳又五日鷙鳥厲疾又五日水澤腹堅雞不始乳淫女亂男鷙鳥不厲國不除兵水澤不腹堅言乃不從白虎通徳論曰十二月律謂之大吕何大大也吕者拒也言陽氣欲出隂不許也吕之為言拒者旅抑拒難之也晉樂志曰十二月之辰謂之丑丑者紐也言終始之際故以紐結為名也夏小正曰十二月𤣥駒賁𤣥駒蟻也賁者走于地中也纂要曰十二月曰暮冬亦曰杪冬涂月暮節暮歳窮稔窮紀月令曰季冬行秋令則白露蚤降介蟲為妖四鄙入保行春令則胎夭多傷國多固疾命之曰逆行夏令則水潦敗國時雪不降氷凍消釋一色雲韓詩外傳凡草木花多五出雪花獨六出雪花曰霙雪雲曰同雲同謂雲隂與天同為一色也故詩云上天同雲雨雪雰雰一丈凍郭義恭廣志北方地寒氷厚三尺地凍一丈千里雪楚詞層氷峨峨飛雪千里王逸注云北極常寒也東坡詩云峨眉山西雪千里謝爕雨雪曲云峨峨六尺氷飄飄千里雪千年氷杜陽編順宗即位年拘彌國貢常堅氷云其國有大凝山其中有氷千年不釋及齎至京師潔冷如故雖盛暑赫日終不消嚼之與中國氷凍無異又神異經云北方有層氷萬里厚百丈又尸子曰朔方之寒氷厚六尺北極左右有不釋之氷又漢五行志云元和間琅邪井氷厚丈餘紺碧霜拾遺記廣延國霜色紺碧又云嵰州霜紺色漢武帝内傳曰仙家上藥有𤣥霜紺雪入液雨瑣碎録閩俗立冬後逢壬日謂之入液至小雪出液得雨謂之液雨無雨則主來年旱諺云液雨不流籜髙田不要作又謂之藥雨百蟲飲此水而蟄林公弁詩云液雨初生小院寒復槽水水衡記黄河水十月名復槽水落復故道也蹙凌水水衡記黄河水十一月十二月名蹙凌水氷斷後結蹙起成層也寶硯爐天寶遺事内庫有七寶研爐一所曲盡其巧每冬寒研凍置于爐上硯凍自消不勞置火帝常用之暖玉鞍天寶遺事岐王有玉鞍一面毎至冬月則用之雖天氣嚴寒此鞍在座下如有温火之氣煖金盒裴鉶傳竒進士張無頗遇袁天罡女袁大孃授藥以煖金盒盛之曰寒時但出此盒則一室暄煖不假爐炭矣金盒乃廣利王宫中之寶却寒簾杜陽雜編咸通九年同昌公主下降錫錢五百萬貫仍罄内庫寶貨以實其宅更賜金麥銀粟數斛堂設連珠之帳續真珠以成也却寒之簾𩔖玳瑁斑有紫色云却寒鳥骨所為也則未知出何國却寒犀杜陽雜編同昌公主堂中設却寒犀又綴五色玉香嚢貯辟寒香前輩詩云辟寒犀外凍雲平禦寒毬提要録太祖登極九州各貢方物燕國劉大王守光遣使進禦寒毬一具辟寒金古今詩話嗽金鳥出昆明國形如雀色黄魏明帝時其國來獻飼以真珠及兎腦常吐金屑如粟宫人爭取為􅁫鈿謂之辟寒金此鳥不畏寒也宫人相嘲曰不服辟寒金那得帝王心不服辟寒鈿那得帝王憐古樂府云誰似辟寒金聊借與空牀煖辟寒香述異記漢武帝時外國貢辟寒香室中焚之雖大寒必減衣衣狐裘吕氏春秋衛靈公天寒鑿池言不寒宛春曰君衣狐裘坐熊席四隅有火所以不寒設羆褥拾遺記周靈王起昆昭之臺設狐腋素裘紫羆大褥一人以指彈席上而暄風入室裘褥皆棄臺下揑鳳炭天寶遺事楊國忠以炭屑用蜜揑塑成雙鳯至冬日則焰於爐中及先以白檀木鋪于爐底餘炭不許叅雜置鳳木杜陽編李輔國嚴凝之時置鳳首木於髙堂大厦中其木髙一尺而雕刻如鸞鳳之形和煦之氣如二三月故别名曰常春木呵牙筆天寳遺事李白常于便殿對明皇撰詔誥時十月大寒筆凍莫能書字帝勅宫嬪十人侍于李白左右令各執牙筆呵之白遂取而書詔李白之受聖眷也如此之厚得玉馬臧榮緒晉書新蔡王騰𤼵于并州于常山之真定縣遇天大雪平地數丈雪融不積騰怪而掘之得玊馬髙尺許上表獻之藜藿野人立春詩云玉馬自能銷朔雪土牛更為𤼵春風炷煖香雲林異景志寶雲谿有僧舎盛冬若客至不燃薪火煖香一炷滿堂如春詹克愛題西山禪房詩云煖香炷罷春生室始信壺中别有天吐氣火葛仙翁别傳公與客談話時天氣大寒仙公謂客曰居貧不能人人得爐火請作一大火共致煖者仙公因吐氣火赫然從口中出須臾火滿堂皆熱脱衣也煑建茗開元遺事逸人王休居太白山下日與僧道異人往還每至冬時取氷敲其精瑩者煑建茗以共賔客飲之飲羔酒提要録世傳陶榖學士買得党太尉家故妓遇雪陶取雪水烹團茶謂妓曰党家應不識此妓曰彼麤人安有此景但能于銷金帳下淺斟低唱飲羊羔兒酒耳陶黙然愧其言東坡詩云試問髙吟三十韻何如低唱兩三杯作妓圍天寶遺事申王每冬月苦寒之際令宫女宻圍于坐側以禦寒氣謂之妓圍揣妓肌天寶遺事岐王每冬寒手冷不近火惟於妙妓懷中揣其肌膚謂之煖手選肉陣開元遺事楊國忠選婢妾肥大者行列於前令遮風謂之肉陣煖寒㑹開元遺事巨豪王元寶毎冬月大雪之際令僕夫掃雪為徑躬立坊前迎揖賔客具酒炙宴樂為煖寒㑹送臘粥皇朝東京夢華録十二月都城賣撒佛花至初八日有僧尼三五為羣以盆器盛金銅佛像浸以香水楊柳洒浴排門教化諸大寺作浴佛㑹并送七寶五味粥謂之臘八粥都人是日亦以果子雜料煑粥而食省燎火燎力召反前漢紀冬民既入婦人同巷相從夜績一月相從以省費燎火同巧拙而合習俗也温母席搜神記羅威字徳行少䘮父事母至孝母年七十天大寒常以身自温席而後授其處煖母枕東觀漢記黄香字文疆江夏安陸人事母至孝每冬寒則身煖枕席夏則扇枕使涼東坡詩云願子聚為江夏枕不勞揮扇自寧親扣氷魚孝子傳王祥少有徳行事後母至孝盛寒氷凍網罟不施母欲得生魚祥解褐扣氷求之忽氷開有雙鯉躍出祥獲以奉母時人謂之至孝所致黄民本後章云卧氷泣竹慰母心號林筍楚國先賢傳左臺御史孟宗事後母至孝母性嗜筍及母亡冬節至宗入林哀號而筍生以供祭祀杜甫詩云逺傳冬筍味更覺綵衣春問歳餘魏畧董遇好學人從學者遇不肯教云當先讀書百遍而義自見從學者云苦渇無日遇曰當以三餘或問三餘之意遇曰冬者歳之餘夜者日之餘雨者晴之餘又見任彦升山谷詩云皇文開萬卷家學陋三餘東坡詩云醉飽髙眠真事業此生有味在三餘足文史漢書方朔自言年十三學三冬文史足用注云貧子冬日乃得學歳時廣記卷四
