body:
  text: 歲時廣記後序識貴乎博書患乎略故入鄧林則知杞梓之良窺武庫則識甲兵之富此太平事蹟所以廣其記也然或紀録雖詳而採擇之未精或條目雖備而顚末之多舛覽者病焉龜峯之麓梅谿之灣有隠君子廣寒之孫涕唾功名金玉篇籍采九流之秀潤擷百氏之英華輔以山經海圖神録怪牒窮力積稔萃成一書目曰歳時廣記搜節物之異聞考風俗之攸尚手編心緝博而不繁補白孔之或遺續晏曽之未備亦後來雜家者流之竒書也誠使操觚之士得之非特可施於竿牘之貽抑且有助於江山之詠至於芳辰麗景懐古感今以心鏡之澂敷中散之辯隨叩隨應取之不窮當有𤼵久不見異人必有得異書之嘆者矣其有詢故實則筆閣而不書質異聞則口呿而莫對此記問不廣之由故曰書不負人而人負書文林郎新行在太平惠民和劑􅈰監門劉純君錫撰
