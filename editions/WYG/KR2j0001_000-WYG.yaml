body:
  text: 歲時廣記時令𩔖提要臣等謹案嵗時廣記四卷宋陳元靚撰元靚不知其里貫自署曰廣寒仙裔而劉純作後序稱為隠君子其始末亦未詳言莫之考也書前又有知無為軍巢縣亊朱鑑序一篇鑑乃朱子之孫即嘗輯詩𫝊遺說者後仕至湖廣總領元靚與之相識則理宗時人矣其書宋志不著録惟見於錢曽讀書敏求記稱前列圖說分四時為四卷今此本乃曹溶學海𩔖編所載卷首並無圖說葢𫝊抄者佚之書中摭月令孝經緯三統厯諸書為綱而以雜書所記涉於節序者按月分𨽻凡春令四十六條夏令五十條秋令三十二條冬令三十八條大抵為啟劄應用而設故於稗官說部多所徴引而爾雅淮南諸書所載足資考據者反多遺缺未可以稱善本特其於所引故典尚皆備録全文詳記所出未失前人遺意與後來𩔖書隨意刪竄者不同故並録存之以備㕘攷焉乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀歲時廣記序有天之時有人之時寒暑之推遷此時之運於天者也厯書所載盖莫詳焉至於因某日而載某事此時之係於人者端千緒萬非託之記述則莫能探其源委耳噫慶道長於一陽之生謹履端於一歲之始是盖天時人事之相參尤有可據彼仲夏之重五季秋之重九豈天之氣候然也而人實為之使微考訂孰知競渡之繇楚靈均登髙之因費長房乎引𩔖而伸若此者衆雖然荆楚歲時之所記善矣惜乎失之拘也秦唐歲時之所記夥矣惜乎未之備也今南潁陳君蒐獵經𫝊以至野史異書凡有渉於節序者萃為巨帙殆靡一遺仰以稽諸天時俯以驗之人事題其篇端曰歲時廣記求予文而序之予惟陳君嘗編博聞三録盛行於世况此書該而不冗雅而不俚自當與並𫝊於無窮云宣教郎特差知無為軍巢縣事兼義武民兵軍正總轄屯戍兵馬借緋新安朱鑑撰
