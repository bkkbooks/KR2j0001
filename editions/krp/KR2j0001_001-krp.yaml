body:
  text: 歲時廣記卷一宋陳元靚撰春孔子家語曰春者四時之首也尚書大傳曰春出也萬物之所出也禮記鄉飲酒曰東方曰春春之為言蠢也淮南子曰春為規規者所以圜萬物也規度不失生氣乃理前漢律厯志曰少陽者東方東動也陽氣動物於時為春春蠢也物蠢生乃動運木曲直仁者生生者圜故為規也月令曰春三月其日甲乙其帝太皥其神勾芒其蟲鱗其音角其數八其味酸其臭羶其祀户祭先肝孟春月禮記月令曰孟春之月日在營室昏參中旦尾中律中太蔟東風解凍蟄蟲始振魚上氷獺祭魚鴻鴈来天氣下降地氣上騰天地和同草木萌動孝經緯周天玉衡六問曰大寒後十五日斗指艮為立春後十五日斗指寅為雨水劉歆三統厯曰立春為正月節雨水為正月中氣雨水者言雪散為雨水也周書時訓曰立春之日東風解凍後五日蟄蟲始振後五日魚上氷雨水之日獺祭魚後五日鴻雁来後五日草木萌動白虎通德論曰正月律謂之太蔟何太亦大也蔟者湊也言萬物始大湊地而出也晉樂志曰正月之辰謂之寅寅者津也謂生物之津途也大戴禮夏小正曰正月啓蟄雉震呴時有俊風滌凍途田䑕出農及雪澤采芸桺稊梅杏杝桃則華春秋隠公元年王正月注云隠公之始年周王之正月也凡人君即位欲其體元居正故不言一年一月玉燭寳典曰正月為端月梁元帝纂要曰正月曰孟陽孟陬上春開春𤼵春獻春首春首歲獻歲𤼵歲初歲肇歲芳歲華嵗月令曰孟春行夏令則雨水不時草木蚤落國時有恐行秋令則其民大疫猋風暴雨總至藜莠蓬蒿並興行冬令則水潦為敗雪霜大摯首種不入仲春月月令曰仲春之月日在奎昬弧中旦建星中律中夾鍾始雨水桃始華倉庚鳴鷹化為鳩𤣥鳥至日夜分雷乃𤼵聲始電蟄蟲咸動啓户始出孝經緯曰雨水後十五日斗指甲為驚蟄後十五日斗指卯為春分三統厯曰驚蟄為二月節春分為二月中氣驚蟄者蟄蟲驚而奔出也周書時訓曰驚蟄之日桃始華後五日倉庚鳴後五日鷹化為鳩春分之日𤣥鳥至後五日雷乃𤼵聲後五日始電白虎通德論曰二月律謂之夾鍾何夾者孚也言萬物孚甲種𩔖分也晉樂志曰二月之辰名為卯卯者茂也言陽氣生而孳茂也夏小正曰二月祭鮪榮堇采繁來降燕乃睇淮南子曰二月之夕女夷鼔歌以司天和以長百穀禽獸草木注云女夷春夏長養之神也江淹文云太皥馭節女夷司景纂要曰二月曰仲陽又曰令月張衡歸田賦云仲春令月時和氣清月令曰仲春行夏令則國乃大旱暖氣早来蟲螟為害行秋令則其國大水寒氣總至寇戎来征行冬令則陽氣不勝麥乃不熟民多相掠季春月月令曰季春之月日在胃昏七星中旦牽牛中律中姑洗桐始華田䑕化為鴽音如虹始見萍始生鳴鳩拂其羽戴勝降于桑孝經緯曰春分後十五日斗指乙為清明後十五日斗指辰為榖雨三統厯曰清明為三月節穀雨為三月中氣清明者謂物生清浄明潔穀雨者言雨以生百穀周書時訓曰清明之日桐始華後五日田䑕化為鴽後五日虹始見穀雨之日萍始生後五日鳴鳩拂羽後五日戴勝降於桑白虎通德論曰三月律謂之姑洗何姑者故也洗者鮮也言萬物皆去故就新莫不鮮明也晉樂志曰三月之辰名為辰辰者震也謂時物盡震動而長也夏小正曰三月參則伏􅕪音斛則鳴頒氷拂桐葩詩曰蠶月條桑蠶月三月也吴民載詩云條風著野方蠶月闕移隂又麥秋唐百家詩云蠶月桑葉青鸎時桺花白纂要曰三月曰暮春末春晚春月令曰季春行冬令則寒氣時𤼵草木皆肅國有大恐行夏令則民多疾疫時雨不降山林不收行秋令則天多沈隂淫雨蚤降兵革並起花信風東臯雜録江南自初春至初夏五日一畨風候謂之花信風梅花風最先楝花風最後凡二十四畨以為寒絶也後唐人詩云楝花開後風光好梅子黄時雨意濃徐師川詩云一百五日寒食雨二十四畨花信風又古詩云早禾秧雨初晴後苦楝花風吹日長條達風易通卦騐立春條風至宋均注云條者條達萬物之風也唐太宗詩云條風開獻節灰律動初陽榆莢雨氾勝書三月榆莢雨髙地强土可以種禾杏花雨提要録杏花開時正值清明前後必有雨也謂之杏花雨古詩云沾衣欲濕杏花雨吹面不寒楊桺風又云楊桺杏花風雨外不知佳句落誰家晏元獻公詞云紅杏開時一霎清明雨趙德麟詞云紅杏枝頭花幾許啼痕止恨清明雨凌解水水衡記黄河水正月名凌解水桃花水水衡記黄河水二月三月名桃花水又顔師古漢書音義云月令仲春之月始雨水桃始華盖桃方華時既有雨水川谷漲泮衆流盛長故謂之桃花水老杜詩云春岸桃花水又曰三月桃花浪注曰峽以三月桃花𤼵時春水生謂之桃花水王摩詰詩云春来到處桃花水歐陽公詩云桃花水下清明路擊春曲酉陽雜俎唐明皇好羯鼓云八音之領袖諸樂不可為比嘗遇二月初詰旦巾櫛方畢時宿雨初晴景色明麗小殿亭前桺杏將吐睹而嘆曰對此景物豈可不與他判㫁乎左右相目將命備酒獨髙力士遣取羯鼔旋命之臨軒縱撃一曲名春光好神思自得及顧杏桺皆已𤼵坼指而笑之謂嬪嬙内宦曰此一事不喚我作天公可乎皆呼萬歲東坡詩云宮中羯鼔催花桺陳簡齋詩云可是天公須羯皷已回寒馭作春酣又六言云未央宮中紅杏羯鼔三聲打開踏春歌異聞録邢鳳之子夢數美人歌踏陽春之曲曰踏陽春人間二月雨和塵陽春踏盡秋風起腸㫁人間白髪人又酉陽雜俎云元和初有士人醉臥㕔中及醒見古屏上婦人悉於牀前踏歌歌曰長安少女踏春陽無處春陽不㫁腸舞袖弓腰渾忘却蛾眉空帶九秋霜又歌曰流水涓涓芹長芽野鳥雙飛客還家荒村無人作寒食殯宫空對棠梨花其中問曰如何是弓腰歌者曰首髻及地腰勢如規也士人驚叱之忽皆上屏東坡詩云城下湖光煖欲波美人唱我踏春歌又詹克愛春睡詩云覺後不知身是幻耳根猶聴踏春聲夢春草南史謝惠連年十歲能屬文族兄靈運加賞之毎有篇章對惠連輒得佳句嘗於永嘉西堂思詩竟日不就忽夢見惠連而得池塘生春草之句大以為工嘗云此語有神助非吾語也杜甫詩云詩應有神助東坡詞云酒闌清夢覺春草滿池塘又詩云春草池塘夢惠連陳后山春夜詩云夢中無好語池草為春生移春檻開元遺事楊國忠子弟春時移名花植木檻中下設輪脚挽以綵絙所至自隨號移春檻探春宴天寳遺事都人士女每至正月半後各乗車跨馬供帳於園圃或郊野中為探春之宴採春遊皇朝東京夢華録上元收燈畢都人争先出城採春大抵都城左近皆是園囿百里之内無非閒地並縱遊人賞翫作樂車天寳遺事楊氏子弟恃后族之貴極於奢侈每春逰以大車結綵為樓載女樂數十人自私第聲樂前引出遊園苑中長安豪民貴族争傚之載油幕天寳遺事長安貴家子弟每至春時遊宴供帳于園圃中隨行載以油幕或遇隂雨以幕覆之盡歡而歸掛裙幄唐輦下歲時記長安士女遊春野歩遇名花則設席藉草以紅裙揷掛以為宴幄其奢侈如此擲金錢開元别記明皇與妃子在花萼樓下以金錢逺近為限賽其無擲於地者以金觥賞之天寳遺事云内庭妃嬪每至春時各於禁中結伴擲金錢為戲駐馬飲天寳遺事長安俠少每春時結朋聨黨各置矮馬飾以錦韉金絡並轡於花樹下往来使僕從執盃酒而隨之遇好花則駐馬而飲隨蝶幸開元遺事開元末明皇每春時旦暮宴于宮中使嬪妃輩争揷艷花帝親捉粉蝶放之隨蝶所止幸之後楊妃專寵遂不復用此戲鬬竒花天寳遺事長安中士女春時鬬花戴揷以竒花多者為勝皆用千金市名花植于庭中以備春時之鬬揷御花天寳遺事長安春時盛於遊賞園林日無閒地蘇頲應制詩云飛埃結紅霧遊盖翻青雲帝覽詩嘉焉遂以御花揷頲之巾上時人榮之取紅花虞世南史略北齊盧士深妻崔林義之女有才學春日以桃花靧面呪曰取紅花取白雪與兒洗面作光悦取白雪取紅花與兒洗面作光華取雪白取花紅與兒洗面作顔容裝獅花曲江春宴録曲江貴家遊賞則剪百花裝成獅子互相送遺獅子有小連環欲送則以蜀錦流蘇牽之唱曰春光且莫去畱與醉人看探花使秦中歲時記進士杏花園初㑹謂之探花宴以少俊二人為探花使遍遊名園若他人先折得名花則二使皆有罰䕶花鈴天寳遺事天寳初寧王少時好聲色風流藴藉諸王弗如也每春時於後園中紐紅絲為繩綴金鈴繋花梢之上有鳥鵲翔集則令園吏掣鈴索以驚之號䕶花鈴括花香唐玉麈録穆宗每宮中花香則以重頂帳䝉蔽欄檻置惜春御史掌之號曰括香臥花酒曲江春宴録虞松方春時謂握月擔風且畱後日吞花臥酒不可過時作紅餤曲江春宴録春遊之家以脂粉作紅餤竿上成雙挑挂夾雜畫帶前引車馬繋煎餅拾遺記江東俗號正月二十日為天穿日以紅縷繋煎餅餌置屋上謂之補天穿李白詩云一枚煎餅補天穿釀梨春白氏六帖杭州俗釀酒趁梨花時熟號梨花春賜桺圈唐史李適為學士凡天子饗食遊豫帷宰相及學士得從春幸梨園並渭水禊除則賜細桺圈辟癘羮錦帶荆湖近事荆渚間有花名錦帶其花條生如郁李仁春末開花紅白如錦初生葉柔脆可食老杜詩云滑憶雕胡飯香聞錦帶羮憐草色長慶集杭州春望詩誰開湖寺西南路草緑裙腰一道斜自注云孤山寺在湖洲中草緑時望如裙腰又東坡詩云春入西湖到處花裙腰芳草抱山斜王介甫詩云遥憐草色裙腰緑湖寺西南一徑開望杏花四民月令清明節令蠶妾理蠶室是月也杏花盛又云杏花生種百穀宋子京詩云催耕併及杏花時蜀主孟昶勸農詔云望杏敦耕瞻蒲勸穡王元長策秀才文云杏花菖葉耕穫不愆看菖葉呂氏春秋冬至後五旬七日菖葉生盖菖者百草之先生也於是始耕又云菖始生於是耕儲光羲詩云蒲葉日以長杏花日以滋農人要看此貴不違天時種辰𤓰齊民要術二月辰日最宜種𤓰山谷詩云夏栽醉竹餘千个春糞辰𤓰滿百區栽雜木氾勝書栽樹正月為上時二月為中時三月為下時然棗雞口槐兎目桑蝦蟇眼榆負癅散其餘雜木䑕耳䖟趄各有時凡種栽并揷皆用此等形象遊蜀江杜氏壺中贅録蜀中風俗舊以二月二日為踏青節都人士女絡繹遊賞緹幕歌酒散在四郊歴政郡守慮有强暴之虞乃分遣戍兵於岡阜坡塜之上立馬張旗望之後乖崖公帥蜀廼曰慮有他虞不若聚之為樂乃於是日自萬里橋以錦繡器皿結綵舫十數隻與郡僚屬官分乗之妓樂數船歌吹前導命曰遊江於是郡人士女駢於八九里間縱觀如堵抵寳歴寺橋出讌於寺内寺前剏一蠶市縱民交易嬉遊歡樂倍於往歲薄暮方回售農用四川記同州以二月二日與八日為市四逺村民畢集應蠶農所用以至車檐椽木果樹器用雜物皆至其直千緡至萬緡者郡守就子城東北隅龍興寺前立山棚設幄幕聲樂以宴勞將吏累日而後罷鬻蠶器欒城文蠶市詩序云眉人以二月望日鬻蠶器謂之蠶市焉東坡先生詩云蜀人衣食常苦艱蜀人行樂不知還十夫耕農萬夫食一年辛苦一春閒閒時尚以蠶為市共牽辛苦遂欣歡又張仲殊詞云成都好蠶市趁遨遊夜放笙歌喧紫陌春邀燈火上紅樓車馬溢瀛州人散後繭館喜綢繆柳葉已饒烟黛細桑條何似玉纎柔立馬看風流騐歲草黄帝問師曠曰吾欲苦樂善心可知否對曰歲欲甘甘草先生薺是也歲欲苦苦草先生葶藶是也歲欲雨雨草先生藕是也歲欲旱旱草先生蒺藜是也歲欲流流草先生蓬是也歲欲惡惡草先生水藻是也歲欲病病草先生艾是也皆以孟春占之占雨霧占書正月朔雨春旱人食一升二日雨人食二升三日雨人食三升四日雨人食四升五日雨主大熟五日内霧穀傷民饑元日霧歲必饑禳鬼鳥荆楚歲時記正月夜多鬼鳥度家家槌床打户捩狗耳滅燈燭以禳之𤣥中記云此烏名姑獲一名天帝女一名隠飛鳥一名夜遊鬼好取人女子養之有小兒之家即以血㸃其衣以為誌故世人號鬼鳥荆湖彌多斯言信矣飲雨水本草正月雨水夫妻各飲一杯還房獲時有子神助也去妖邪西京雜記賈佩蘭云在宫中時正月上辰出池邉盥濯食蓬餌以去妖邪辟官事厯書二月上丑日取土泥蠶屋宜蠶上辰日取道中土泥門應辟官事照百鬼荆楚歲時記正月未日夜蘆茝火照井厠百鬼皆走歲時廣記卷一
