body:
  text: 歲時廣記卷三宋陳元靚撰秋禮記郷飲酒曰西方曰秋秋之為言愁也愁之以時察守義者也太𤣥經曰秋者物皆成象而聚也管子曰秋者隂氣始下故萬物收說文曰秋禾榖熟也淮南子曰秋為矩矩者所以方萬物也前漢律厯志曰少隂者西方西遷也隂氣遷落物於時為秋秋􅒫也物􅒫歛乃成熟金從革改更也義者成成者方故為矩也月令曰秋三月其日庚辛其帝少皥其神蓐收其蟲毛其音商其數九其味辛其臭腥其祀門祭先脾􅒫子由反孟秋月禮記月令曰孟秋之月日在翼昏建星中旦畢中律中夷則凉風至白露降寒蟬鳴鷹乃祭鳥天地始肅農乃登榖孝經緯曰大暑後十五日斗指坤為立秋後十五日斗指申為處暑三統厯曰立秋為七月節處暑為七月中氣處暑者謂暑將退伏而潛處也周書時訓曰立秋之日涼風至後五日白露降後五日寒蜩鳴涼風不至國無嚴政白露不降民多欬病寒蜩不鳴人臣力爭處暑之日鷹乃祭鳥後五日天地始肅後五日農乃登穀白虎通徳論曰七月律謂之夷則何夷傷則法也言萬物始傷破刑法也歐陽公秋聲賦云其在樂也商聲主西方之音夷則為七月之律商傷也物至老而傷悲夷戮也物既盛而當戮晉樂志曰七月之辰謂為申申者身也言時萬物身體皆成就也夏小正曰七月狸子肇肆肇始也肆遂也言其始遂也詩七月曰七月流火又曰七月鳴鵙又曰七月烹葵及菽又曰七月食瓜注云流下也火大火也李白詩云火落金風髙謝靈運詩云火逝首秋節七命云龍火西頺提要録曰七月為蘭月纂要曰七月曰首秋上秋蘭秋肇秋月令曰孟秋行冬令則陰氣大勝介蟲敗榖戎兵乃來行春令則其國乃旱陽氣復還五榖無實行夏令則國多火災寒熱不節民多瘧疾仲秋月月令曰仲秋之月日在角昏牽牛中旦觜觿中律中南吕盲風至鴻雁來𤣥鳥歸羣鳥養羞日夜分雷乃收聲蟄蟲坏户殺氣浸盛陽氣日衰水始涸孝經緯曰處暑後十五日斗指庚為白露後十五日斗指酉為秋分三統厯曰白露為八月節秋分為八月中氣白露者隂氣漸重露濃色白周書時訓曰白露之日鴻雁來後五日𤣥鳥歸後五日羣鳥養羞鴻雁不來逺人背叛𤣥鳥不歸室家離散羣鳥不羞臣下驕慢秋分之日雷乃始收後五日蟄蟲坏户後五日水始涸雷不始收諸雨淫汰蟄蟲不坏民靡有賴水不始涸介蟲為害白虎通徳論曰八月律謂之南吕何南者任也吕者拒也言陽氣尚有任生薺麥也故隂氣拒之也晉樂志曰八月之辰謂為酉酉者綇也謂時物皆綇縮也夏小正曰八月辰則伏丹鳥羞白鳥白鳥蚊蚋也崔豹古今注云螢火一名丹鳥腐草化之羞進也謂食蚊蚋也詩七月曰八月雈葦又曰八月載績又曰八月其穫又曰八月剥棗又曰八月斷壺注云蒹為雈葭為葦載績者絲事畢而麻事起也其穫者禾可穫也剥撃也壺瓠也提要録曰八月為桂月纂要曰八月曰仲商月令曰仲秋行春令則秋雨不降草木生榮國乃有恐行夏令則其國乃旱蟄蟲不藏五榖復生行冬令則風災數起收雷先行草木蚤死季秋月月令曰季秋之月日在房昏虛中旦柳中律中無射鴻雁來賔雀入大水為蛤菊有黄華豺乃祭獸戮禽草木黄落蟄蟲咸俯在内皆墐其户孝經緯曰秋分後十五日斗指辛為寒露後十五日斗指戌為霜降三統厯曰寒露為九月節霜降為九月中氣寒露者言露氣寒將欲凝結周書時訓曰寒露之日鴻雁來賔後五日雀入大水後五日菊有黄華霜降之日豺祭獸後五日草木黄落後五日蟄蟲咸俯白虎通徳論曰九月之管名無射射者出也言時陽氣上升萬物收藏無復出也晉樂志曰九月之辰謂為戍戌者滅也謂時物皆衰滅也夏小正曰九月内火注云大火心星也詩七月曰九月授衣又曰九月叔苴又曰九月滌場圃又曰九月肅霜注云叔拾也苴麻子也肅縮也霜降而收縮萬物也國語曰至於元月注云九月為元范蠡曰王姑待至於元月漢韓明府修孔子廟器表碑曰永壽二年霜月之靈説者疑是九月提要録曰九月為菊月纂要曰九月曰暮秋末秋暮商季商杪秋亦曰霜辰亦曰授衣月令曰季秋行夏令則其國大水冬藏殃敗民多鼽嚏行冬令則國多盜賊邊境不寧土地分裂行春令則暖風來至民氣懈惰師興不居仙掌露前漢班固傳武帝建章宫承露盤上有仙人掌承露和玉屑飲之金莖銅柱也神農本草云繁露水是秋露繁濃時也作盤以收之煎令稠可食之延年不飢漢武帝時東方朔得𤣥露青黄二露各盛五合帝賜羣臣老者皆少病者皆除東方朔曰日初出處露皆如糖可食後武帝立金莖作仙人掌承露盤取雲表之露服食以求仙文選子堅西都賦云抗仙掌以承露擢雙立之金莖張平子西京賦云承雲表之清露青女霜淮南子秋三月也氣不藏百蟲蟄青女廼出以降霜雪注云青女乃天神青腰玉女主霜雪也杜甫詩云飛霜任青女賜被隔南宫山谷詩云姮娥携青女一笑粲萬瓦李商隠詩云青女素娥俱耐冷月中霜裏鬬嬋娟吕夷簡詩云花愁青女再飛霜蓼花風月令章句仲秋白霜節盲風至鄭𤣥云疾風也秦人謂之蓼花風梁文帝初秋詩云盲風度函谷墜露下芳枝裂葉風洞宴記裂葉風乃八月風也離合風陸機要覧列子御風而行常以立春日歸於八荒立秋日遊于風穴風至則草木皆生去則草木揺落謂之離合風鯉魚風提要録鯉魚風乃九月風也李賀詩云樓前流水江陵道鯉魚風起芙蓉老又古詞云瑞霞成綺映舴艋棹輕鯉魚風起黄雀雨提要録九月雨為黄雀雨羅鄂州詞云九月江南秋色黄雀雨鯉魚風豆花雨荆楚歳時記豆花雨乃八月雨也荻苗水水衡記黄河水七八月名荻苗水荻花正開也登髙水水衡記黄河水九月名登髙水一葉落淮南子一葉落而天下知秋韓文公詩云淮南悲葉落今我亦傷秋唐人詩云山僧不解數甲子一葉落知天下秋韋蘇州詩云新秋一葉飛草木衰文選宋玉九辯悲哉秋之為氣也蕭瑟兮草木搖落而變衰憭慄兮若在逺行登山臨水兮送將歸泬寥兮天高而氣清寂㵳兮收潦而水清李白詩云深秋宋玉悲老杜詩云揺落深知宋玉悲陳簡齋詩云宋玉有文悲落木警鶴鳴風土記鳴鶴戒露白鶴也此鳥性警至八月白露降即鳴而相警東坡詩云由來警露鶴石雁飛南康記平固縣覆笥山上有湖中有石雁浮在湖上毎至秋飛鳴如候時也鱖魚肥海録碎事楝木華而石首至秋風起而鱖魚肥蟋蟀吟天寶遺事毎秋時宫中妃妾皆以小金籠閉蟋蟀寘枕函畔夜聽其聲民間爭傚之親燈火昌黎文韓退之送子阿符讀書城南詩云時秋積雨霽新凉入郊墟燈火稍可親簡編可卷舒圍棋局西京雜記戚夫人侍兒賈佩蘭言宫中八月四日出雕房北户竹下圍碁勝者終年多富負者終年多病取絲縷就北辰星求長命乃免獻菊酒唐書李適為學士凡天子饗㑹游豫唯宰相及學士得從秋登慈恩浮圖獻菊花酒稱壽思蓴鱸晉文苑傳張翰字季鷹呉郡人為齊王冏東曹掾見秋風起思呉中菰米蓴羮鱸魚鱠嘆云人生貴得適志何能羈宦數百里外以要名爵乎乃歎曰秋風起兮木葉飛呉江水清鱸魚肥遂命駕而歸後齊王敗人皆謂之見機又海物異名記云江南人作鱠名郎官鱠言因張翰得名東坡詩云浮世功名食與眠季鷹直得水中仙不須更説知機早直為鱸魚也自賢又送人歸呉有詞云更有鱸魚堪切鱠山谷詩云東歸止為鱸魚鱠未敢知言許季鷹王荆公詩云慷慨秋風起悲歌不為鱸收兎毫墨藪筆取崇山絕仭中兎毛八九月收之筆頭長一寸管長五寸鋒齊腰彊者揮襟作之屈曲真草皆須盡一身之力而送之騐美玉地鏡經八月中草不死有葉枝下垂者必有美玉又云八月後草不死者亦有玉㸃艾杖文昌雜録唐歳時節物八月一日有㸃艾杖盧公範饋餉儀云㸃艾杖以棃枝為之及銀盞中有朱砂銀枝子也厭兒疾荆楚歳時記八月十日四民以朱㸃小兒頭名為天灸以厭疾也取栢露續齊諧記郄紹八月朝入華山見一童子以五綵嚢承取柏葉下露皆如珠子且云赤松先生取以明目今人八月朝作露華明是也又荆楚歳時記云四民以錦綵為眼明嚢云赤松子以八月嚢承栢樹露為宜眼後世以金箔為之逓相餉遺結絲嚢隋唐嘉話八月五日明皇生辰號千秋節王公戚里進金鏡士庶結承露絲嚢相遺又述仙記云八月作五明嚢承百草露以洗眼登南樓晉史庾亮𫝊亮鎮武昌諸佐史殷浩之徒秋夜乗月共登南樓俄而亮至諸人將起避之亮徐曰諸君少住老子于此興復不淺便據胡牀與浩等談詠竟夕其坦率如此陶侃曰亮非惟風流兼有為政之實也老杜詩云月静庾公樓懐故里提要錄王粲觀秋月懐弟妹故里而傷神老杜詩云曉鶯工迸泪秋月解傷神注云春鶯秋月人所賞玩而鶯所工者在於迸人之淚月所解者在於傷人之神亂離疾病之所感也悲遊子南史江淹過灞陵秋深葉脱乃嘆曰向眼風物寥落祗悲遊子故園之思老杜詩云風物悲遊子江山憶故人歎謫仙文粹李白秋興歌我覺秋興逸誰云秋興悲賀知章見之曰是子謫仙人也賞白蓮天寶遺事明皇八月太液池有千葉白蓮數枝盛開帝與貴戚宴賞左右皆歎羡久之帝指貴妃示左右曰爭如我解語花古詞云翠葢盈盈紅粉面葉底荷花解語水晶宫漁隠叢話呉興謂之水晶宫而不載之圖經惟呉興集有之刺史楊漢公九月十五夜絶句云江南地暖少嚴風九月炎涼正得中溪上玉樓樓上月清光合在水晶宫疑因此而得名也歳時廣記卷三
