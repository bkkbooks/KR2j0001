body:
  text: 歲時廣記卷二宋陳元靚撰夏禮記鄉飲酒曰南方曰夏夏之為言假也養之長之假之仁也太𤣥經曰夏者物之修長也董仲舒策曰陽常居大夏以生育長養為事淮南子曰夏為衡衡者所以平萬物也前漢律厯志曰太陽者南方南任也陽氣任養物於時為夏夏假也物假大乃宣平火炎上禮者齊齊者平故為衡也月令曰夏三月其日丙丁其帝炎帝其神祝融其蟲羽其音徵其數七其味苦其臭焦其祀竈祭先肺孟夏月禮記月令曰孟夏之月日在畢昬翼中旦婺女中律中中音仲吕螻蟈鳴蚯蚓出王𤓰生苦菜秀靡草死麥秋至孝經緯曰穀雨後十五日斗指巽為立夏後十五日斗指已為小滿三統厯曰立夏為四月節小滿為四月中氣小滿者言物長於此小得盈滿周書時訓曰立夏之日螻蟈鳴後五日蚯蚓出後五日王𤓰生小滿之日苦菜秀後五日靡草死後五日麥秋至白虎通德論曰四月律謂之中吕何言陽氣極將彼故復中難之也晉志云吕者助也謂陽氣盛長陰助成功也晉樂志曰四月之辰謂之己巳者起也物至此時畢盡而起也夏小正曰四月昴則見詩七月曰四月秀葽注云不榮而實曰秀葽草也西京雜記曰陽徳用事則和氣皆陽建已之月是也故謂之正陽之月又曰四月陽雖用事而陽不獨存此月純陽疑於無隂故亦謂之隂月纂要曰四月曰首夏維夏文選注鄭𤣥曰四月為除月月令曰孟夏行秋令則苦雨數來五穀不滋四鄙入保行冬令則草木蚤枯後乃大水敗其城郭行春令則蝗蟲為災暴風来格秀草不實仲夏月月令曰仲夏之月日在東井昏亢中旦危中律中㽔賔小暑至螳螂生鶪始鳴反舌無聲鹿角解蟬始鳴半夏生木堇榮孝經緯曰小滿後十五日斗指丙為芒種後十五日斗指午為夏至三統厯曰芒種為五月節夏至為五月中氣芒種者言有芒之穀可稼種也周書時訓曰芒種之日螳螂生後五日鶪始鳴後五日反舌無聲夏至之日鹿角解後五日蟬始鳴後五日半夏生白虎通德論曰五月律謂之㽔賔何㽔者下也賔者敬也言陽氣上極隂氣始賔敬之也晉樂志曰五月之辰謂之午午者長也大也言物皆長大也夏小正曰五月參則見良蜩鳴初昏大火中注云大火心星名也詩七月曰五月鳴蜩又曰五月斯螽動股注云蜩螗也斯螽蚣蝑也吴子夜四時歌曰鬱蒸仲暑月東坡詩云飛龍御月作秋涼注云謂五月也月令曰仲夏行冬令則雹涷傷穀道路不通暴兵来至行春令則五穀晚熟百螣時起其國乃饑行秋令則草木零落果實早成民殃於疫季夏月月令曰季夏之月日在桺昏火中旦奎中律中林鍾溫風始至蟋蟀居壁鷹乃學習腐草為螢土潤溽暑大雨時行孝經緯曰夏至後十五日斗指丁為小暑後十五日斗指未為大暑三統厯曰小暑為六月節大暑為六月中氣小暑大暑者就極熱之中分為小大月初為小月半為大周書時訓曰小暑之日溫風至後五日蟋蟀居壁後五日鷹乃學習大暑之日腐草為螢後五日土潤溽暑後五日大雨時行白虎通徳論曰六月律謂之林鍾何林者衆也萬物成熟種𩔖衆多晉樂志曰六月之辰謂之未未者味也謂時萬物向成有滋味也夏小正曰六月鷹始摯詩七月曰六月莎雞振羽又曰六月食鬱及薁注云鬱棣屬薁蘡薁也纂要曰六月曰徂暑月令曰季夏行春令則穀實鮮落國多風欬民乃遷徙行秋令則丘隰水潦禾稼不熟乃多女災行冬令則風寒不時鷹隼蚤鷙四鄙入保黄梅雨風土記夏至雨名黄梅雨霑衣服皆敗黤四時纂要云梅熟而雨曰梅雨又閩人以立夏後逢庚日為入梅芒種後逢壬日為出梅農人以得梅雨乃宜耕稼故諺云雨不梅無米炊𤨏碎録又云芒種後逢壬入梅前半月為梅雨後半月為時雨遇雷雹謂之斷梅數説未知孰是又陳氏手記云梅雨水洗瘡疥滅瘢痕入醬令易熟沾衣便腐澣垢如灰汁有異他水江淮以南地氣卑濕五月上旬連下旬尤甚梅雨壊衣當以梅葉湯洗之餘並不脱杜甫詩云南京犀浦道四月熟黄梅湛湛長江去𠖇𠖇細雨来歐陽公詩云春寒欲盡黄梅雨東坡詩云不趁青梅嘗煮酒要看細雨濕黄梅又云佳節連梅雨又云怕見黄梅雨細時嚴維詩云梅天一雨清送梅雨埤雅今江湘二浙四五月間梅欲黄落則水潤土溽柱磉皆汗蒸鬱成雨謂之梅雨自江以南三月雨謂之迎梅五月雨謂之送梅林逋詩云石枕涼生菌閣虛已應梅潤入圖書濯枝雨風土記仲夏雨濯枝盪川注云此節常有大雨名曰濯枝雨畱客雨陸機要覽昔羽山有神人焉逍遥於中嶽與左元放共遊薊子訓所坐欲起子訓欲畱之一日之中三雨今呼五月三雨亦為畱客雨香雨李賀四月詞依微香雨青氛氲膩葉蟠花照曲門暴涷雨爾雅暴雨謂之涷雨郭璞注云江東呼夏月暴雨為涷雨離騷經云令飄風兮先驅使涷雨兮洗塵涷音東海颶風南越志熙安間多颶風颶風者具四方之風也常以五六月發未至時雞犬為之不鳴國史補云南海有颶風四面而至倒屋拔木每數年一作鄭熊番禺雜記云颶風將𤼵有微風細雨先緩後急謂之鍊風又有石尤風亦颶之𩔖韓文公詩云雷威固已加颶勢仍相借又云颶風有時作掀簸真差事又云峽山逢颶風雷電助撞捽颶音具落梅風風俗通五月有落梅風江南以為信風李白詩云天長信風吹日出宿霧散黄雀風風土記南中六月則有東南長風止時海魚化為黄雀故俗名黄雀風麥黄水水衡記黄河水四月名麥黄水瓜蔓水水衡記黄河水五月名𤓰蔓水𤓰生蔓也東坡詩云河水渺緜瓜蔓流山礬水水衡記黄河水六月名山礬水麥熟秋月令章句百穀各以初生為春熟為秋故麥以孟夏為秋山谷詩云生物趨功日夜流園林纔夏麥先秋趙師民詩云麥秋晨氣潤槐夏午隂涼分龍節圖經池州俗以五月二十九三十日為分龍節雨則多大水閩人以夏至後為分龍雨各有方龍生日岳州風土記五月十三日謂之龍生日栽竹多茂盛又前輩作蒼筠𫝊云筠每歲惟五月十三日獨醉或為人迎置他處不知也當時諺曰此君經年常清齋一日不齋醉如泥有時倒載過晉地茫然乗墜俱不知宋子京種竹詩云隂地圍牆植翠筠疎枝茂葉與時新賴逢醉日終無損正似徳全於酒人晏元獻公詩云竹醉人還醉蠶眠我亦眠又云苒苒渭濵族蕭蕭塵外姿如能樂封植何必醉中移又東坡詩云竹是當年醉日栽竹迷日筍譜民間説竹有生日即五月十三日移竹宜用此日或隂雨土虚則鞭行明年筍莖交至一云竹迷日栽竹年年生筍劉延世竹迷日種竹詩云梅蒸方過有餘潤竹醉由来自古云掘地聊栽數竿玉開簾還當一溪雲然則竹迷亦此日也陳簡齋種竹詩云何須俟迷日可笑世俗情櫻笋厨唐輦下歲時記四月十五日自堂厨至百司厨通謂之櫻笋厨又韓偓櫻桃詩注云秦中謂三月為櫻笋時陳后山詩云春事無多櫻笋来又古詞云水竹舊院落櫻笋新蔬果臨水宴因話録李少師與賔僚飲宴暑月臨水以荷為杯滿酌密繋持近人口以筯刺之不盡則重飲讌罷有人言昨飲大歡者公曰今日言歡則明日之不懽無論好惡一不得言霹靂酒醉鄉日月暑月候大雷霆時収雨水淘米炊飯釀酒名曰霹靂酒寒筵氷醉鄉日月盛夏初昏於井側安鑊用大水晶一塊大如拳無瑕釁者以新汲水熾火煑千沸取越瓶口小腹大者滿盛其湯以油帛密封口勿令泄氣復以重湯煮千沸急沈井底平旦出之破瓶氷已結矣名寒筵氷又見杜陽雜編壬癸席河東備録申王取猪毛刷浄命工織以為席滑而且涼號曰壬癸席澄水帛杜陽編同昌公主一日大㑹暑氣將甚公主命取澄水帛以水蘸之挂於髙軒滿座皆思挾纊澄水帛長八九尺似布細明薄可鑒云其中有龍涎故能消暑氷絲裀樂府雜録唐老子本長安富家子生計蕩盡遇老嫗持舊裀以半千獲之有波斯人見之乃曰此是氷蠶絲所織暑月置於座滿室清凉即酬千萬消涼珠拾遺記黒蚌珠千年一生燕昭王常懷此珠當盛暑之月體自輕涼號消暑招涼之珠辟暑犀提要録唐文宗夏日延學士講易賜辟暑犀章簡公端午帖子云已持犀辟暑更鬬草迎涼迎涼草杜陽襍編李輔國夏則于堂中設迎涼草其象𩔖如草而榦似若竹葉細如杉雖若乾枯而未嘗彫落盛暑挂之忩户間則涼風自至白龍皮劇談録李相嘗因夏日邀同列及朝士宴時畏景赫曦咸有鬱蒸之苦既延入小齋列坐開尊煩暑都盡清飇凜冽如渉髙秋及昬而罷出户則火雲烈日熇然焦灼有好事者求親信問之云此日以金盆貯水漬白龍皮置於座末龍皮者新羅僧得自海中犀如意楊妃外𫝊唐𤣥宗夏月授楊妃却暑犀如意洒皮扇開元遺事王元寳都中巨豪也家有皮扇製作甚精寳每暑月宴客即以此扇置於座前使新水洗之則颯然風生酒筵之間客有寒色遂命撤去明皇亦曾差中使取看愛而不授曰此龍皮扇子也服丸散抱朴子曰或問不熱之道曰服𤣥氷丸飛雪散王仲都等用此方也梁劉孝威苦暑詩云𤣥氷術難驗赤道漏猶長環罏火桓子新論元帝被病廣求方士漢中逸人王仲都者詔問所能為對曰但能忍寒暑耳因為待詔至夏大暑日使暴坐又環以十罏火不言熱而身汗不出入寒泉括地圖天毒國冣大暑熱夏草木皆乾死民善没水以避日遇時暑常入寒泉之下激涼風唐書拂菻國盛暑之節乃引水潛流上通於屋宇機制巧密人莫之知觀者唯聞屋上泉鳴俄見四檐飛澑懸波如瀑布激氣成涼風没水底抱朴子葛洪從祖仙公毎大醉及夏天盛熱輒入水底八日乃出正以能閉氣胎息耳開七井雲林異景志霍仙鳴别墅在龍門一室之中開七井皆以雕鏤盤覆之夏月坐其上七井生涼不知暑氣乗小駟開元雜記𤣥宗幸洛至繡嶺宫時屬炎暑上曰姚崇多計令力士探廻奏曰崇方袗絳乗小駟按轡木隂下乃命小駟頓忘繁溽臥北忩晉書陶潛字淵明諡靖節先生嘗言夏月虚閒髙臥北忩之下清風颯至自謂羲皇上人東坡詩云一枕清風直萬錢無人肯買北忩眠又云只應陶靖節㑹聴北忩眠又云北忩仙人臥羲軒又云北忩髙臥等羲炎書新裙南史羊欣字敬元長於𨽻書父不疑為烏程令欣時年十二王獻之為吴興守甚知愛之嘗夏月入縣欣著新練裙晝寢獻之書裙數幅而去欣本工書因此彌善東坡詩云載酒無人過子雲掩闗晝臥客書裙翟公巽睡鄉賦云客書裙而滿幅作夏課南部新書長安舉子落第者六月後不出謂之過夏多借浄坊廟院作文章曰夏課時語曰槐花黄舉子忙又見秦中記遯齋閒覽云謂槐之方花乃進士赴舉之時也唐翁承贊詩云雨中裝㸃望中黄勾引蟬聲送夕陽憶得當年隨計吏馬蹄終日為君忙又稼軒詞云明年此日青雲路却笑人間舉子忙逐樹隂北齊書僕射魏収字伯起初習武不成改節讀書夏日坐板牀隨逐樹隂諷讀累年牀為之鋭減遂工辭令也練螢囊晉陽春秋車𦙍字武子家貧讀書不常得油夏月則練囊盛數十螢以夜繼日頒氷雪止戈集長安氷雪至夏月則價等金碧每頒氷雪論筐不復償價日日如是賜朱櫻唐史李適為學士凡天子饗食遊豫唯宰相及學士得從夏宴蒲萄園賜朱櫻獻雪瓜唐列傳明崇儼以竒技自名髙宗召見甚悦盛夏帝思雪崇儼坐頃取以進自云往隂山取之四月帝意瓜崇儼索百錢須臾以瓜獻曰得之緱氏老人圃中帝召老人問故曰埋之瓜失之土中得百錢沈瓜李魏文帝與吴質書浮甘瓜於清泉沈朱李於寒水杜詩云翠瓜碧李沈玉甃注云玉甃井也賦杞菊提要録陸龜䝉自號天隨子常食杞菊及夏五月枝葉老硬氣味苦澀猶食不已因作杞菊賦以自廣云爾杞未棘爾菊未莎其如余何東坡詩云飢寒天隨子杞菊自擷芼調寢餗攝生月令四月為乾萬物以成天地化生勿冒極熱勿大汗後當風勿暴露星宿皆成惡疾勿食大蒜勿食生薤勿食雞肉蛇鱔是月肝藏以病神氣不行火氣漸臨水力漸衰稍補腎助肺調和胃氣無失其時收蠶沙河圖甲子收蠶沙於宅内亥地埋之令人大富得蠶又甲子日以一石二㪷鎮宅令家財千萬求蛇醫蛇醫即蜥蜴也酉陽雜爼王彦威鎮汴之二年夏旱李玘過汴因以旱為言李醉曰欲雨甚易可求蛇醫四頭石甕二枚每甕實水浮二蛇醫以木盖密泥之置於閙處甕前後設席燒香選小兒十歲以下十餘令執小青竹晝夜更撃其甕不得少輟王如其言試之一日兩夜雨大注數百里舊説龍與蛇醫為親家焉又張師正倦㳺録云熙寧間京師久旱按古法令坊巷以甕貯之揷桺枝泛蜥蜴小兒呼曰蜴蜥蜴蜥興雲吐霧降雨滂沱放汝歸去翰府名談云宋内翰祁鎮鄭州夏旱公文祭蜥蜴於祈所即時大雨告足民乃有秋東坡詩云甕中蜥蜴為可笑占蝗旱四時纂要四月辰雨皆為蝗蟲大雨大蟲小雨小蟲二日雨百艸旱五穀不成三日雨小旱風從西来麻吉四日雨五穀貴五日六日雨有旱處四日至七日風者大豆吉八日㣲雨熟俗云八日雨斑闌髙低盡可憐此月自一日至十四日惡風者皆不可種豆歲時廣記卷二
