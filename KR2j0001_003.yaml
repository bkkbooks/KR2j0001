body:
  text: 卷第一春孔子家語曰春者四時之首尚書大傳曰春出也萬物之所出也禮記鄉飲酒曰東方曰春春之為言蠢也淮南子曰春為規規者所以圜萬物也規度不失生氣乃理前漢律歷志曰少陽者東方東動也陽氣動物於時為春春蠢也物蠢生乃動運木曲直仁者生生者圜故為規也月令曰春三月其日甲乙其帝太皞其神勾芒其蟲鱗其音角其數八其味酸其臭羶其祀戶祭先肝孟春月禮記月令曰孟春之月日在營室昏參中旦尾中律中太簇東風解凍蟄蟲始振魚上冰獺祭魚鴻雁來天氣下降地氣上騰天地和同草木萌動孝經緯周天七衡六間曰大寒後十五日斗指艮為立春後十五日斗指寅為雨水劉歆三統歷曰立春為正月節雨水為正月中氣雨水者言雪散為雨水也周書時訓曰立春之日東風解凍後五日蟄蟲始振後五日魚上冰雨水之日獺祭魚後五日鴻雁來後五日草木萌動白虎通德論曰正月律謂之太簇何太亦大也簇者湊也言萬物始大湊地而出也晉樂志曰正月之辰謂之寅寅津也謂之物生津途也大戴禮夏小正曰正月啓蟄雉震詬時有俊風滌凍塗田鼠出農及雪澤采蕓柳稊梅杏柂桃則華春秋隱公元年王正月注云隱公之始年周王之正月也凡人君即位欲其體元居正故不言一年一月玉燭寶典曰正月為端月梁元帝纂要曰正月曰孟陽孟陬上春開春發春獻春首春首歲獻歲發歲初歲肇歲芳歲華歲月令曰孟春行夏令則雨水不時草木早落國時有恐行秋令則其民大疫猋風暴雨總至藜莠蓬蒿並興行冬令則水潦為敗雪霜大摯首種不入仲春月月令曰仲春之月日在奎昏弧中旦建星中律中夾鍾始雨水桃始華倉庚鳴鷹化為鳩玄鳥至日夜分雷乃發聲始電蟄蟲咸動啓戶始出孝經緯曰雨水後十五日斗指申為驚蟄後十五日斗指卯為春分三統歷曰驚蟄為二月節春分為二月中氣驚蟄者蟄蟲驚而始出也周書時訓曰驚蟄之日桃始華後五日倉庚鳴後五日鷹化為鳩春分之日玄鳥至後五日雷乃發聲後五日始電白虎通德論曰二月建律謂之夾鍾何夾者孚也言萬物孚甲種類分也晉樂志曰二月之辰名為卯卯者茂也言陽氣生而孳茂也夏小正曰二月祭鮪采蘩來降燕乃睇淮南子曰二月之夕女夷鼓歌以司天和以長百穀禽獸草木女夷春夏長養之神也江淹文云春暉馭節女夷司景纂要曰二月曰仲陽又曰令月張平子歸田賦云仲春令月時和氣清月令曰仲春行夏令則國乃大旱暖氣早來蟲螟為害行秋令則其國大水寒氣總至寇戎來征行冬令則陽氣不勝麥乃不熟民多相掠季春月月令曰季春之月日在胃昏七星中旦牽牛中律中姑洗桐始華田鼠化為鴽音如虹始見萍始生鳴鳩拂其羽戴勝降於桑孝經緯云春分後十五日斗指乙為清明後十五日斗指辰為穀雨三統歷曰穀雨為三月節清明為三月中氣穀雨者言雨以生百穀清明者謂物生清淨明潔周書時訓曰清明之日桐始華後五日田鼠化為鴽後五日虹始見穀雨之日萍始生後五日鳴鳩拂其羽後五日戴勝降於桑白虎通德論曰三月律謂之姑洗何姑者故也洗者鮮也言萬物皆去故就新莫不鮮明也晉樂志云三月之辰名為辰辰者震也謂時物盡震動而長也夏小正曰參則伏螜音斛則鳴頒冰拂桐芭詩曰蠶月條桑蠶月三月也吳民載詩云條風著野方蠶月高樹移陰又麥秋唐百家詩曰蠶月桑葉青鶯時柳花白纂要曰三月曰暮春末春晚春月令曰季春行冬令則寒氣時發草木皆肅國有大恐行夏令則民多疾疫時雨不降山陵不收行秋令則天多沉陰淫雨蚤降兵革並起花信風東皋雜録江南自初春至初夏五日一番風候謂之花信風梅花風最先楝花風最後凡二十四番以為寒絶也後唐人詩云楝花開後風光好梅子黃時雨意濃徐師川詩云一百五日寒食雨二十四番花信風又古詩云早禾秧雨初晴後苦楝花風吹日長條達風易通卦驗立春條風至宋均注云條者條達萬物之風也唐太宗詩云條風開獻節灰律動初陽榆莢雨汜勝書三月榆莢雨高地強土可種林杏花雨提要録杏花開時正值清明前後必有雨也謂之杏花雨古詩沾衣欲濕杏花雨吹面不寒楊柳風又云楊柳杏花風雨外不知佳句落誰家晏元獻公詞云紅杏開時一霎清明之雨趙德麟詞云紅杏枝頭花幾許啼痕正恨清明雨凌解水水衡記黃河水三月名凌解水桃花水水衡記黃河水二月三月名桃花水又顏師古漢書音義云月令仲春之月始雨水桃始華蓋桃方華時既有雨水川谷漲泮衆流盛長故謂之桃花水老杜詩云春岸桃花水又云三月桃花浪注曰峽中以三月桃花發時春水生謂之桃花水王摩詰詩云春來到處桃花水又歐陽公詩云桃花水下清明路擊春曲酉陽雜俎唐明皇好羯鼓云八音之領袖諸樂不可為比嘗遇二月初詰旦巾櫛方畢時宿雨初晴景色明麗小殿亭前柳杏將吐覩而嘆曰對茲景物豈可不與他判斷乎左右相目將命備酒獨高力士遣取羯鼓旋命之臨軒縱擊一曲名春光好神思自得反顧杏花皆已發坼指而笑之謂嬪嬙內官曰此一事不喚我作天公可乎皆呼萬歲東坡詩云宮中羯鼓催花柳陳簡齋詩云可是天公須羯鼓已回寒馭作春酣又六言云未央宮中紅杏羯鼓三聲打開踏春歌異聞録邢鳳之子夢數美人歌踏陽春之曲曰踏陽春人間二月雨和塵陽春踏盡秋風起腸斷人間白髮人又酉陽雜俎云元和初有士人醉臥廳中及醒見古屏上婦人悉於床前踏歌歌曰長安少女踏春陽無處春陽不斷腸舞袖弓腰渾忘卻蛾眉空帶九秋霜又歌曰流水涓涓芹長芽野鳥雙飛客還家荒村無處作寒食殯宮空對棠梨花中一人問曰如何是弓腰歌者曰首髻及地腰勢如規也士人驚叱之忽皆上屏東坡詩云城上湖光暖欲波美人唱我踏春歌又詹克愛春睡詩云覺後不知身是幻耳根猶聽踏歌聲夢春草南史謝惠連年十歲能屬文族兄靈運嘉賞之每有篇章對惠連輒得佳句嘗於永嘉西堂思詩竟日不就忽夢見惠連而得池塘生春草之句大以為工常云此語有神助非吾語也杜甫詩云詩應有神助東坡詞云酒闌詩夢覺春草滿池塘又詩云春草池塘夢惠連陳后山春夜詩云夢中無好語池草為春生移春檻開元遺事楊國忠子弟春時移名花異木植檻中下設輪腳挽以綵絙所至自隨號移春檻探春宴天寶遺事都人士女每至正月半後各乘車跨馬供帳於園圃或郊野中為探春之宴探春遊皇朝東京夢華録上元收燈畢都人爭先出城探春大抵都城左近皆是園圃百里之內並無闃地並縱遊人賞玩作樂車天寶遺事楊氏子弟恃后族之貴極于奢侈每春遊以大車結綵為樓載女樂數十人自私第聲樂前引出遊園苑長安豪民貴族爭效之載油幕天寶遺事長安貴家子弟每至春日遊宴供帳於園圃中隨行載以油幕或遇陰雨以幕覆之盡歡而歸挂裙幄唐輦下歲時記長安士女遊春野步遇名花則設席藉草以紅裙插挂以為宴幄其奢侈如此擲金錢開元別紀明皇與貴妃在花蕚樓下以金錢遠近為限賽其無擲于地者以金觥賞之天寶遺事云內庭妃嬪每至春日各于禁中結伴擲金錢為戲駐馬飲天寶遺事長安俠士每春日結朋約黨各置矮馬飾以錦韉金絡並轡於花樹下往來使僕從執酒杯而從之遇好花則駐馬而飲隨蝶幸開元遺事開元末明皇每春時旦暮宴於宮中使嬪妃輩爭插豔花帝親捉粉蝶放之隨蝶所止幸之後貴妃專寵遂不復用此戲鬭奇花天寶遺事長安王士安春時鬭花戴插以奇花多者為勝皆用千金市名花植于庭中以備春時之鬭插御花天寶遺事長安春日盛於遊賞園林日無間地蘇頲應制詩云飛埃結紅霧遊蓋翻青雲帝覽詩嘉焉遂以御花插頲之巾上時人榮之取紅花虞世南史略北齊盧士深妻崔林義之女有才學春日以桃花靧面靧曰取紅花取白雪與兒洗面作光悅取白雪取紅花與兒洗面作光華取雪白取花紅與兒洗面作顏容裝獅花曲江春宴録曲江貴家遊賞則剪百花裝成獅子互相送遺獅子有小連環欲送則以蜀錦流蘇牽之唱曰春光且莫去留與醉人看探花使秦中歲時記進士杏花苑初會謂之探花宴以少俊二人為探花使遍遊名園若他人先折得名花則二使皆有罰護花鈴天寶遺事天寶初寧王少時好聲色風流蘊藉諸王弗如也每春日於後園中紐紅絲為繩綴金鈴繫花梢之上有烏鵲翔集則令園吏掣鈴索以驚之號護花鈴括花香唐玉麈録穆宗每宮中花香則以重頂帳蒙蔽檻外置惜春御史掌之號曰括香臥花酒曲江春宴録虞松方春以謂握月擔風且留後日吞花臥酒不可過時作紅餤曲江春宴録春遊之家以脂粉作紅餤竿上成雙挑挂夾雜畫帶前引車馬繫煎餅拾遺記江東俗號正月二十日為天穿日以紅縷繫煎餅餌置屋上謂之補天穿李白詩云一枚煎餅補天穿釀梨春白氏六帖杭州俗釀酒趁梨花時熟號梨花春賜柳圈唐書李適為學士凡天子饗食遊豫惟宰相與學士得從春幸梨園並渭水褉除則賜柳圈辟癘羹錦帶荊湖近事荊渚中有花名錦帶其花條生如郁李仁春末開花紅白如錦初生葉柔脆可食老杜詩云滑憶雕胡飯香聞錦帶羹憐草色長慶集杭州春望詩誰開湖寺西南路草緑裙腰一道斜自注云孤山在湖洲中草緑時望如裙腰又東坡詩云春入西湖到處花裙腰芳草抱山斜王介甫詩云遙憐草色裙腰緑湖寺西南一徑開望杏花四民月令清明節令蠶妾理蠶室是月也杏花盛又云杏花生種百穀宋子京詩云催耕併及杏花時蜀主孟昶勸農詔云望杏敦耕瞻蒲勸穡王元長策秀才文云杏花菖葉耕穫不愆看菖葉呂氏春秋冬至後五旬七日菖葉生蓋菖者百草之先生也於是始耕又云菖始生於是耕儲光羲詩云菖葉日巳長杏花日已滋農人要看此貴不違天時種辰瓜齊民要術三月辰日最宜種瓜山谷詩云夏栽醉竹餘千箇春糞辰瓜滿百區栽雜木汜勝書栽樹正月為上時二月為中時三月為下時然棗雞口槐兔目桑蝦蟆眼榆負瘤散其餘雜木鼠耳蛇趄各其時凡種栽并插皆用此等形象遊蜀江杜氏壺中贅録蜀中風俗舊以二月二日為踏青節都人士女絡繹遊賞緹幕歌酒散在四郊歷政郡守慮有強暴之虞乃分遣戍兵於岡阜坡冢之上立馬張旗望之後乖崖公帥蜀乃曰慮有他虞不若聚之為樂乃于是日自萬里橋以錦繡器皿結綵舫十數隻與郡僚屬官分乘之妓樂數船歌吹前導名曰遊江於是都人士女駢於八九里間縱觀如堵抵寶歷寺橋出宴于寺內寺前創一蠶市縱民交易嬉遊樂飲倍於往歲薄暮方回售農用四川記同州以二月二日與八日為市四方村民畢集應蠶農所用以至車簷椽木果樹器用雜物皆至其值千緍至萬緍者郡守就子城之東北隅龍興寺前立山棚設幄幕樂以宴勞將吏纍日而罷鬻蠶器欒誠文蠶市詩序云蜀人以二月望日鬻蠶器謂之蠶市東坡先生詩云蜀人衣食常苦艱蜀人行樂不知還十夫耕農萬夫食一年辛苦一春間間時尚以蠶為市共忘辛苦逐欣歡又張仲殊詞云成都好蠶市趁遨遊夜放笙歌喧紫陌春邀燈火上紅樓車馬溢瀛洲人散後繭館喜綢繆柳葉已饒煙黛細桑條何似玉纖柔立馬看風流驗歲草黃帝問師曠曰吾欲若樂善心可知否對曰歲欲甘甘草先生薺是也歲欲苦苦草先生葶藶是也歲欲雨雨草先生藕是也歲欲旱旱草先生蒺藜是也歲欲流流草先生蓬是也歲欲惡惡草先生水藻是也歲欲病病草先生艾是也皆以孟春占之占雨霧占書正月朔雨春旱人食一升二日雨人食二升三日雨人食三升四日雨人食四升五日雨主大熟五日內霧穀傷民飢元日霧歲必飢禳鬼鳥荊楚歲時記正月夜多鬼鳥度家家槌床打戶捩狗耳滅燈火以禳之玄中記云此鳥名姑獲一名天帝女一名隱飛鳥一名夜遊女好取人女子養之有小兒之家即以血點其衣以為志故世號鬼鳥荊湖彌多斯言信矣飲雨水本草三月雨水夫妻各飲一杯還房獲時有子神助也去妖邪西京雜記賈佩蘭云在宮中正月上辰出池邊盥濯食蓬餌以祓妖邪辟官事歷書二月上丑日取土泥蠶屋宜蠶上辰日取道中土泥門應辟官事照百鬼荊楚歲時記正月未日夜蘆苣火照井廁百鬼皆走
