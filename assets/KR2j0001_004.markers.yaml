  - {type: variant, offset: 3962, length: 437, content: 月為乾萬物以成天地化生勿冒極熱勿大汗後當風勿暴露星宿以成惡疾勿食大蒜勿食生薤勿食雞肉蛇蟮是月肝藏以病祌氣不行火氣漸臨水力漸衰稍補腎助肝調和胃氣無失其時埋蠶沙河圖四月收蠶沙於宅內亥地埋之令人大富得蠶又甲子日以一碩三㪷鎮宅令家財千萬求蛇醫蛇醫即蜥蜴也酉陽雜俎王彥威鎮汴地之二年夏旱季玘過汴因以旱為言季醉曰欲雨甚易可求蛇醫四頭石甕二枚每甕實水浮二蛇醫以木為蓋密泥之置于閑處甕前後設席燒香選小兒十歲以下十餘人令執小青竹晝夜更擊其甕不得少輟王如其言試之一日兩夜雨大注數百里舊說龍與蛇醫為親家焉又張師正倦遊錄云熙寧中京師久旱按古法令坊巷以甕貯水插柳枝泛蜥蜴小兒呼曰蜥蜴蜥蜴興云吐霧降雨滂沱放汝歸去翰府名談云宋內翰祁鎮鄭州夏旱公文祭蜥蜴於祈所即時大雨告足民乃有秋東坡詩云甕中蜥蜴為可笑占蝗旱四時纂要四時辰雨皆為蝗蟲大雨大蟲小雨小蟲二日雨百草旱五穀不成三日雨小旱風從西來麻吉四日雨五穀貴五日六日雨有旱處四日至七日風者大豆吉八日微雨熟俗云八日雨斑闌高低田可憐此月自一日至十四日惡風者皆不可種豆, WYG: ''}
