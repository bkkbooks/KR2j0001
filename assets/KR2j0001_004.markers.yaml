  - {type: variant, offset: 1862, length: 1, content: 河, WYG: 峨眉山西雪千里謝爕雨雪曲云峨峨六尺氷飄飄千里雪千年氷杜陽編順宗即位年拘彌國貢常堅氷云其國有大凝山其中有氷千年不釋及齎至京師潔冷如故雖盛暑赫日終不消嚼之與中國氷凍無異又神異經云北方有層氷萬里厚百丈又尸子曰朔方之寒氷厚六尺北極左右有不釋之氷又漢五行志云元和間琅邪井氷厚丈餘紺碧霜拾遺記廣延國霜色紺碧又云嵰州霜紺色漢武帝内傳曰仙家上藥有𤣥霜紺雪入液雨瑣碎録閩俗立冬後逢壬日謂之入液至小雪出液得雨謂之液雨無雨則主來年旱諺云液雨不流籜髙田不要作又謂之藥雨百蟲飲此}
