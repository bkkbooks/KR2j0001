  - {type: variant, offset: 3367, length: 0, content: '', krp: 試問髙吟三十韻何如低唱兩三杯作妓圍天寶遺事申王每冬月苦寒之際令宫女宻圍于坐側以禦寒氣謂之妓圍揣妓肌天寶遺事岐王每冬寒手冷不近火惟於妙妓懷中揣其肌膚謂之煖手選肉陣開元遺事楊國忠選婢妾肥大者行列於前令遮風謂之肉陣煖寒㑹開元遺事巨豪王元寶毎冬月大雪之際令僕夫掃雪為徑躬立坊前迎揖賔客具酒炙宴樂為煖寒㑹送臘粥皇朝東京夢華録十二月都城賣撒佛花至初八日有僧尼三五為羣以盆器盛金銅佛像浸以香水楊柳洒浴排門教化諸大寺作浴佛㑹并送七寶五味粥謂之臘八粥都人是日亦以果子雜料煑粥而食省燎火燎力召反前漢紀冬民既入婦人同巷相從夜績}
  - {type: variant, offset: 3368, length: 0, content: '', WYG: 月相從以省費燎火同巧拙而合習俗也温母席搜神記羅威字徳行少䘮父事母至孝母年七十天大寒常以身自温席而後授其處煖母}
