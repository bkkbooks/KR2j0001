  - {type: 'tls:seg', offset: 504, content: '', id: KR2j0001_CHANT_004-8a.15}
  - {type: variant, offset: 508, length: 300, content: 災暴風來格秀草不實仲夏月月令曰仲夏之月日在東井昏亢中旦危中律中蕤賓小暑至螳蜋生鶪始鳴反舌無聲鹿角解蟬始鳴半夏生木堇榮孝經緯曰小滿後十五日斗指丙為芒種後十五日斗指午為夏至三統歷曰芒種為五月節夏至為五月中氣芒種者言有芒之穀可稼種也周書時訓曰芒種之日螳蜋生後五日鶪始鳴後五日反舌無聲夏至之日鹿角解後五日蟬始鳴後五日半夏生白虎通德論曰五月律謂之蕤賓何蕤者下也賓者敬也言陽氣上極陰氣始賓敬之也晉樂志云五月之辰謂之午午者長也大也言物皆長大也夏小正曰五月參則見蜋蜩鳴初昏大火中注云大火心星名也詩七月曰五月鳴蜩又曰五月斯螽動股注云蜩螗也斯螽蜈蝑也吳子夜四時歌曰鬱蒸仲暑月東坡詩云飛龍御月作秋涼注云謂五月也月令曰仲夏行, WYG: 敗水泉咸竭民多疥癘季}
