  - {type: variant, offset: 3744, length: 196, content: 士見天子饗會遊豫唯宰相及學士得從夏宴蒲萄園賜朱櫻獻雪瓜唐列傳明崇儼以奇技自名高宗召見甚悅盛夏帝思瓜崇儼坐頃取以進自云往陰山取之四月帝憶瓜崇儼索百錢須臾以瓜獻曰得之緱氏老人圃中帝召老人問故曰埋一瓜失之土中得百錢沈瓜李魏文帝與吳質書浮甘瓜于清泉沉朱李于寒水杜詩云翠瓜碧李沉玉甃注云玉甃井也賦杞菊提要錄陸龜蒙自號天隨子常食杞菊及夏月枝葉老硬氣味苦澀猶食不已因作杞菊賦以自廣云爾杞未棘爾菊未莎其如余何, WYG: 陋三餘}
