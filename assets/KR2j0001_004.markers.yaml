  - {type: variant, offset: 3099, length: 264, content: 熱而身汗不出入寒泉括地圖天毒國最大暑熱夏草木皆乾死民善沒水以避日遇暑時常入寒泉之下激涼風唐書拂林國盛暑之節乃引水潛流上通於屋宇機制於巧匠人莫之知觀者唯於屋上聞泉鳴俄見四檐飛溜懸波如瀑激氣成涼風沒水底抱樸子葛洪從祖僊公每大醉及夏天盛熱輒入水底八日乃出正以能閉氣胎息耳開七井云林異景志霍仙鳴別墅在龍門一室之中開七井皆以雕鏤盤覆之夏月坐其上七井生涼不知暑氣乘小駟開元雜記玄宗幸洛至綉嶺宮時屬炎暑上曰姚崇多計令力士探之回奏曰崇方袗絺乘小駟按轡木陰上乃命駟頓忘繁溽臥北窗晉書陶潛字淵明謚靖節先生嘗言夏月虛閑高臥北窗之下清風颷至自謂羲皇上人, WYG: ''}
