  - {type: variant, offset: 2231, length: 285, content: 還當一溪雲然則竹迷亦正此日也陳簡齋種竹詩云何須俟迷日可笑世俗情櫻筍廚唐輦下歲時記四月十五日自堂廚至百司廚通謂之櫻筍廚又韓偓櫻桃詩注云秦中以三月為櫻筍時陳后山詩云春事無多櫻筍來又古詞云水竹舊院落櫻筍新蔬果臨水宴因話錄李少師與賓僚飲宴暑月臨水以荷為杯滿酌密繫持近人口以筯刺之不盡則重飲宴罷有人言昨飲大歡者公曰今日言歡則明日之不歡無論好惡一不得言霹靂酒醉鄉日月暑月候大雷霆時收雨水淗米炊飯釀酒名曰霹靂酒寒筵冰醉鄉日月盛夏初夏於井側安鑊以大水晶一塊大如拳無瑕釁者以新汲水熾火煮千沸取越瓶口小腹大者滿盛其湯以油帛密封口勿令泄氣復以重湯煮千沸急沉井底平旦出之破瓶冰已結矣名寒筵冰又見, WYG: ''}
