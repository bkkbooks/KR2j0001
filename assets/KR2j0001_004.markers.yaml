  - {type: variant, offset: 467, length: 1, content: 孟, WYG: 仲冬之月日在斗昏東壁中旦軫中律中黄鍾氷益壯地始坼鶡旦不鳴虎始交芒始生荔挺出蚯蚓結麋角解水泉動孝經緯曰小雪後十五日斗指壬為大雪後十五日斗指子為冬至三統厯曰大雪為十一月節冬至為十一月中氣周書時訓曰大雪之日鶡鳥不鳴後五日虎始交後五日荔挺出冬至之日蚯蚓結後五日麋角解後五日水泉動白虎通徳論曰十一月律謂之黄鍾何黄中和之色也鍾動也言陽氣動於黄泉之下動養萬物也晉樂志曰十一月之辰謂之子子者孳也謂陽氣至此更孳生也}
