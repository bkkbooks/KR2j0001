  - {type: variant, offset: 1501, length: 356, content: 有大雨名曰濯枝雨留客雨陸機要覽昔羽山有神人焉逍遙于中嶽與左元放共遊薊子訓所坐欲起子訓應欲留之一日之中三雨今呼五月三雨亦為留客雨薇香雨李賀四月詞依微香雨青氛氳膩葉蟠花照曲門暴凍雨爾雅暴雨謂之涷郭璞注云江東呼夏月暴雨為涷雨離騷經云令飄風兮先驅使涷雨兮灑塵涷音朿海颶風南越志熙安間多颶風颶風者具四方之風也常以五月六月發未至時雞犬為之不鳴國史補云南海有颶風四面而至倒屋拔木每數年一至鄭熊番禺雜記云颶風將發有微風細雨先緩後急謂之鍊風又有石尤亦此之類韓文公詩云雷威固已加颶勢仍相借又云颶風有時作掀簸真差事又云峽山逢颶風雷電助撞捽颶音具落梅花風俗通五月有落梅風江南以為信風李白詩云天長信風吹日出宿霧散黃雀風風土記南中六月則有東南長風至時海魚化為黃雀故俗名黃雀風麥黃水水衡記黃河水四月名麥黃水苽蔓水水衡記黃河水五月名苽蔓水苽生蔓, WYG: 寒}
