  - {type: variant, offset: 2624, length: 1, content: 亦, krp: 矣其}
  - {type: variant, offset: 2626, length: 305, content: 玉點艾枝文昌雜錄唐歲時節物八月一日有點艾枝盧公範饋餉儀云點炙枝以梨枝為之反銀盞中有硃砂銀枝子也厭兒疾荊楚歲時記八月十日泗民以朱點小兒頭名為天炙以厭疾也取柏露續齊諧記鄧紹八月朝入華山見一童子以五彩囊承取柏葉上露皆如珠子且云赤松先生取以明目今人八月朝作眼明袋是也又荊楚歲時記云四民並以錦綵為眼明囊云赤松子以八月囊承柏樹露為宜眼後世以金箔為之遞相餉遺結絲囊隋唐嘉話八月五日明皇生辰號千秋節王公戚里進金鏡士庶結承露絲囊相遺述征記云八月作五明囊盛百草露以洗眼登南樓晉史庾亮傳亮鎮武昌諸佐史殷浩之徒秋夜乘月共登南樓俄而亮至諸人將起避之亮徐曰諸君小住老子於此興復不淺便據胡床與浩等談詠竟夕其坦率如此陶侃曰亮非惟風流更有為政之, WYG: 詢故}
