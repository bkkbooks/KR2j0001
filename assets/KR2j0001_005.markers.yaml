  - {type: variant, offset: 279, length: 1049, content: 日涼風至後五日白露降後五日寒蜩鳴涼風不至國無嚴政白露不降民多欬病寒蜩不鳴人臣力爭處暑之日鷹乃祭鳥後五日天地始肅後五日農乃登穀白虎通德論曰七月律謂之夷則何夷傷則法也言萬物始傷被刑法也歐陽公秋聲賦云其為樂也商聲主西方之音夷則為七月之律商傷也物既老而悲傷夷戮也物既盛而當殺晉樂志曰七月之辰謂之申申者身也言時萬物身體皆成就也夏小正曰七月貍子肇肆肇始也肆遂也言其始遂也詩七月曰七月流火又曰七月鳴鳴又曰七月烹葵及菽又曰七月食瓜注云流下也火大火也李白詩云火落金風高謝靈運詩云火逝首秋節七命云龍火西頹提要錄曰七月為蘭月纂要曰七月為首秋上秋蘭秋肇秋月令曰孟秋行冬令則陰炁大勝介蟲敗穀戎兵乃來行春令則其國乃旱陽氣復還五穀無實行夏令則國多火災寒熱不節民多瘧疾仲秋月月令曰仲秋之月日在角昏牽牛中旦觜觿中律中南呂盲風至鴻雁來玄鳥歸群鳥養羞日夜分雷乃收聲蟄蟲坯戶殺氣浸盛陽氣日衰水始涸孝經緯曰處暑後十五日斗指庚為白露後十五日斗指酉為秋分三統歷曰白露為八月節秋分為八月中氣白露者陰炁漸重露濃色白周書時訓曰白露之日鴻雁來後五日玄鳥歸後五日群鳥養羞鴻雁不來遠人背叛玄鳥不歸室家離散群烏不羞臣下驕慢秋分之日雷乃始收後五日蟄蟲坯戶後五日水始涸雷不始收聲諸侯淫汏蟄蟲不坯戶民靡有賴水不始涸介蟲為害白虎通德論曰八月律謂之南呂何南者任也言陽氣尚有任生薺麥也故陰拒之也晉樂志曰八月之辰謂之酉酉者緧也謂時物皆緧縮也夏小正曰八月辰則伏丹鳥羞白鳥白鳥蚊蚋也崔豹古今註云螢火一名丹鳥腐草化之羞進也謂食蚊蚋也詩七月曰八月雚葦又曰八月載績又曰八月其穫又曰八月剝棗又曰八月斷壺註云薍為雚葦為葭載績者絲事畢而麻事起其穫者禾可穫也剝擊也壺瓠也提要錄曰八月為桂月纂要錄曰八月曰仲商月令曰仲秋行春令則秋雨不降草木生榮國乃有恐行夏令則其國乃旱蟄蟲不藏五穀復生行冬令則風災數起收雷先行草木蚤死季秋月月令季秋之月日在房昏虛中旦柳中律中無射鴻雁來賓雀入大水為蛤菊有黃華豺乃祭獸戮禽草木黃落蟄蟲咸俯在內皆墐其戶孝經緯曰秋分後十五日斗指辛為寒露後十五日斗指戌為霜降三統歷曰寒露為九月節霜降為九月中氣寒露者言露氣寒將欲凝結周書時訓曰寒露之日鴻雁來賓後五日雀入大水為蛤後五日菊有黃華霜降之日豺祭獸後五日草木黃落後五日蟄蟲咸俯白虎通德論曰九月謂之無射何射者終也言萬物隨陽而終也晉樂志曰九月之辰謂之戌戌者滅也謂時物皆衰滅也夏小正曰九月內火注云大火心星也詩七月曰九月授衣又曰九月叔苴又曰九月滌場圃又曰九月肅霜注云叔拾也苴麻子也肅縮也霜降而收縮萬物也國語曰至于玄月注云九月為玄月范蠡曰王姑待, WYG: 詠}
