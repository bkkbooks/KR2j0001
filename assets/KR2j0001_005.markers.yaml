  - {type: variant, offset: 1461, length: 1150, content: 掌承露和玉屑飲之金莖銅柱也神農本草云繁露水是秋露繁濃時也作盤以收之煎令稠可食之延年不飢漢武帝時東方朔得玄黃青露各盛五合帝賜群臣老者皆少病者皆除東方朔曰日初出處露皆如糖可食後武帝立金莖作仙人掌承露盤取云表之露服食之以求仙文選孟堅西都賦云抗仙掌以承露擢雙立之金莖張平子西京賦云承云表之清露青女霜淮南子秋三月氣不藏百蟲蟄青女乃出以降霜雪注云青女乃天神青腰玉女主霜雪也杜甫詩云飛霜任青女賜被隔南宮山谷詩云姮娥攜青女一笑粲萬瓦李商隱詩云青女素娥俱耐冷月中霜裹斗嬋娟呂夷簡詩云花愁青女再飛霜蓼花風月令章句仲秋白露節盲風至鄭玄云疾風也秦人謂之蓼花風梁文帝初秋詩云肓風度函谷墜露下芳枝裂葉風洞冥記裂葉風乃八月節也離合風陸機要覽列子御風而行常以立春歸於八荒立秋日游於風穴風至則草木皆生去則草木搖落謂之離合風鯉魚風提要錄鯉魚風乃九月風也李賀詩云樓前流水江陵道鯉魚風起芙蓉老又古詞云瑞霞成綺映舴艋棹輕鯉魚狂風起黃雀雨提要錄九月雨為黃雀雨羅鄂州詞云九月江南秋色黃雀雨鯉魚風荳花雨荊楚歲時記荳花雨乃八月雨也荻苗水水衡記黃河水七八月名荻苗水荻花正開也登高水水衡記黃河水九月名登高水一葉落淮南子一葉落而天下知秋韓文公詩云淮南悲葉落今我亦傷秋唐人詩云山僧不解數甲子一葉落知天下秋韋蘇州詩云新秋一葉落草木衰文選宋玉九辨悲哉秋之氣也皇天平分四時兮竊獨悲此凜秋蕭瑟兮草木搖落而變衰泬寥兮天高而氣清寂漻兮收潦而水清憭慄兮若在遠行李白詩云深秋宋玉悲老杜詩云搖落深知宋玉悲又云清秋宋玉悲陳簡齋詩云宋玉有文悲落葉警鶴鳴風土記鳴鶴戒露白鶴也此鳥性警至八月白露降即鳴而相警東坡詩云由來警露鶴石鴈飛南康記平固縣覆笥山上有湖中有石鴈浮於湖上每至秋飛鳴如候時也鱖魚肥海錄碎事楝木華而石首至秋風起而鱖魚肥蟋蟀吟天寶遺事每秋時宮中妃妾以小金籠閉蟋蟀置枕函畔夜聽其聲時民間爭傚之親燈火昌黎文韓退之送子阿符讀書城南詩云時秋積雨霽新涼入郊墟燈火稍可親簡編可卷舒圍棋局西京雜記戚夫人侍兒賈佩蘭言宮中八月四日出雕房北戶竹下圍碁勝者終年有福負者終年多病取絲縷就北辰星下求長命乃免秋菊酒唐書李適為學士凡天子饗會游豫唯宰相及學士得從秋登慈恩浮圖獻菊花酒稱壽思蒪鱸晉文苑傳張翰字季鷹吳郡人為齊王冏東曹椽見秋風起思吳中菰米蒪羹鱸魚膾嘆云人生貴得適志何能羈宦數百里外以要名爵乎乃嘆云秋風起兮木葉飛吳江水清鱸魚肥遂命駕而歸後齊王敗人皆謂之見機又海物異名記云江南人作鱠名郎官鱠言因張翰得名東坡詩云浮世功名食與眠季鷹直得水中仙不須更說知機早直為鱸魚也自賢又送人歸吳有詞云更有鱸魚堪切鱠山谷詩云東歸止為鱸魚鱠未敢知言許季鷹王荊公詩云慷慨秋風起悲歌不為鱸收兔毫墨藪筆取崇山絕仞中兔毛八九月收之筆頭長一寸管長五寸鋒齊腰彊者揮襟作之屈曲真草皆須盡一身之力而送之驗美玉地鏡經八月中草木獨有葉枝下垂者, WYG: ''}
