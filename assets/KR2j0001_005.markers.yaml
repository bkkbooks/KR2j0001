  - {type: variant, offset: 2932, length: 239, content: 也老杜詩云月靜庾公樓懷故里提要錄王粲觀秋月懷弟妹故里而傷神老杜詩云曉鶯工迸淚秋月解傷神注云春鶯秋月人所賞翫而鶯所工者在于迸人之淚月所解者在于傷人之神蓋亂離疾病之所感也悲遊子梁史江淹過灞陵秋深葉脫乃嘆曰何限風物寥落秖悲遊子故園之思老杜詩云風物悲遊子江山憶故人歎謫仙文粹李白秋興歌我覺秋興逸誰云秋興悲賀知章見之曰是子謫仙人也賞白蓮天寶遺事明皇八月太液池有千葉白蓮數枝盛開帝與貴戚宴賞左右皆嘆羨久之帝指貴妃示左右爭如我解語花古詞云翠蓋盈盈紅粉面葉底荷花解語水晶宮漁隱叢話吳興謂之水晶宮, WYG: 則筆閣}
