  - {type: variant, offset: 1418, length: 1, content: 遙, krp: 暑月候大雷霆時収雨水淘米炊飯釀酒名曰霹靂酒寒筵氷醉鄉日月盛夏初昏於井側安鑊用大水晶一塊大如拳無瑕釁者以新汲水熾火煑千沸取越瓶口小腹大者滿盛其湯以油帛密封口勿令泄氣復以重湯煮千沸急沈井底平旦出之破瓶氷已結矣名寒筵氷又見杜陽雜編壬癸席河東備録申王取猪毛刷浄命工織以為席滑而且涼號曰壬癸席澄水帛杜陽編同昌公主一日大㑹暑氣將甚公主命取澄水帛以水蘸之挂於髙軒滿座皆思挾纊澄水帛長八九尺似布細明薄可鑒云其中有龍涎故能消暑氷絲裀樂府雜録唐老子本長安富家子生計蕩盡遇老嫗持舊裀以半千獲之有波斯人見之乃曰此是氷蠶絲所織暑月置於座滿室清凉即酬千萬消涼珠拾遺記黒蚌珠千年一生燕昭王常懷此珠當盛暑之月體自輕涼號消暑招涼之珠辟暑犀提要録唐文宗夏日延學士講易賜辟暑犀章簡公端午帖子云已持犀辟暑更鬬草迎涼迎涼草杜陽襍編李輔國夏則于堂中設迎涼草其象𩔖如草而榦似若竹葉細如杉雖若乾枯而未嘗彫落盛暑挂之忩户間則涼風自至白龍皮劇談録李}
  - {type: variant, offset: 1420, length: 0, content: '', WYG: 嘗因夏日邀同列及朝士宴時畏景赫曦咸有鬱蒸之苦既延入小齋列坐開尊煩暑都盡清飇凜冽如渉髙秋及昬而罷出户則火雲烈日熇然焦灼有好事者求親信問之云此日以金盆貯水漬白龍皮置於座末龍皮者新羅僧得自海中犀如意楊妃外𫝊唐𤣥宗夏月授楊妃却暑犀如意洒皮扇開元遺事王元寳都中巨豪也家有皮扇製作甚精寳每暑月宴客即以此扇置於座前使新水洗之則颯然風生酒筵之間客有寒色遂命撤去明皇亦曾差中使取看愛而不授曰此龍皮扇子也服丸散抱朴子曰或問不熱之道曰服𤣥氷丸飛雪散王仲都等用此方也梁劉孝威苦暑詩云𤣥氷術難驗赤道漏猶長環罏火桓子新論元帝被病廣求方士漢中逸人王仲都者詔問所能為對曰但能忍寒暑耳因為待詔至夏大暑日使暴坐又環以十罏火不言熱而身汗不出入寒泉括地圖天毒國冣大暑熱夏草木皆乾死民善没水以避日遇時暑常入寒泉之下激涼風唐書拂菻國盛暑之節乃引水潛流上通於屋宇機制巧密人莫之知觀者唯聞屋上泉鳴俄見四檐飛澑懸波如瀑布激氣成涼風没水底抱朴子葛洪從祖仙公毎大醉及夏天盛熱輒入水底八日乃出正以能閉氣胎息耳開七井雲林異景志霍仙鳴别墅在龍門一室之中開七井皆以雕鏤盤覆之夏月坐其上七井生涼不知暑氣乗小駟開元雜記𤣥宗幸洛至繡嶺宫時屬炎暑上曰姚崇多計令力士探廻奏曰崇方袗絳乗小駟按轡木隂下乃命小駟頓忘繁溽臥北忩晉書陶潛字淵明諡靖節先生嘗言夏月虚閒髙臥北忩之下清風颯至自謂羲皇上人東坡詩云一枕清風直萬錢無人肯買北忩眠又云只應陶靖節㑹聴北忩眠又云北忩仙人臥羲軒又云北忩髙臥等羲炎書新裙南史羊欣字敬元長於𨽻書父不疑為烏程令欣時年十二王獻之為吴興守甚知愛之嘗夏月入縣欣著新練裙晝寢獻之書裙數幅而去欣本工書因此彌善東坡詩云載酒無人過子雲掩闗晝臥客書裙翟公巽睡鄉賦云客書裙而滿幅作夏課南部新書長安舉子落第者六月後不出謂之過夏多借浄坊廟院作文章曰夏課時語曰槐花黄舉子􅋉又見秦中記遯齋閒覽云謂槐之方花乃進士赴舉之時也唐翁承贊詩云雨中裝㸃}
