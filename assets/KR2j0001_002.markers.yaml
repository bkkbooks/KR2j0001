  - {type: variant, offset: 316, length: 407, content: 商風素風凄風高風涼風悲風激風清風景曰朗景澄景清景時曰凄辰霜辰節曰素節嘉節草曰衰草木曰疏木衰林霜柯冬曰玄英氣黑而清英三冬九冬天曰上天言時無事在上臨下風曰寒風勁風嚴風厲風哀風陰風景曰冬景寒景時曰寒辰節曰嚴節鳥曰寒鳥寒禽草曰寒卉黃草木曰寒木寒柯素木寒條爾雅歲陽爾雅疏釋曰此別太陽在日在辰之名也甲至癸為十日日為陽寅至丑為十二辰辰為陰漢書律歷志乃以前歷上元泰初四千六百一十七歲至元封七年復得閼逢攝提格之歲中冬孟康曰言復得者上元泰初時亦是閼逢之歲歲在甲曰閼逢在寅曰攝提格此謂甲寅之歲也然則乙歲名之圖卯之歲曰旃蒙單閼丙辰之歲曰柔兆執徐丁巳之歲曰疆圉大荒落戊午之歲曰著雍敦牂巳未之歲曰屠維協洽庚申之歲曰上章涒灘辛酉之歲曰重光作噩壬戌之歲曰元黓閹茂癸亥之歲曰昭陽大淵獻甲子之歲曰閼逢困敦乙丑之歲曰旃蒙赤奮若推此周而復始可知也爾雅月陽爾雅疏釋此乃辨以日配月之名設若正月得甲曰畢陬二月得乙曰橘如三月得丙曰修丙四月得丁曰圉余五月得戊曰厲皋, WYG: ''}
