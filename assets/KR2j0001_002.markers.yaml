  - {type: variant, offset: 1050, length: 202, content: 成歲日出日沒永短之圖淮南子曰日出于暘谷浴于咸池拂于扶桑是謂晨明登于扶桑之上東方之野爰始將行是謂朏明謂將明也至于曲阿曲阿山名是謂朝明臨于曾泉東方多水之地是謂早食次于桑野是謂晏食臻于衡陽是謂禺中對于昆吾昆吾邱在南方是謂正中靡于鳥次西南方之山名是謂小遷至于悲谷悲谷西北方之山名是謂脯時回于女紀西方陰地是謂大遷經于泉隅是謂高舂頓于連石西方山名是謂下舂爰止義和爰息六螭是謂懸車薄于虞泉是謂黃昏淪于蒙谷是謂定昏梁元帝, WYG: ''}
