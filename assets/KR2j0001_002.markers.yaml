  - {type: variant, offset: 1925, length: 758, content: 百一十三日四分日之三七閏計二百十一日尚余三日四分日之三積至八十一章然后盈虛之數終而復始矣玉衡隨炁指建圖孝經緯大雪后玉衡指子冬至指癸小寒指丑大寒指艮立春指寅雨水指甲驚蟄指卯春分指乙清明指辰谷雨指丙立夏指巳小滿指巽芒種指午夏至指丁小暑指未大暑指坤立秋指戊處暑指庚白露指酉秋分指辛寒露指戌霜降指乾立冬指亥小雪指壬大雪漢志云玉衡北斗也招搖逐月推移圖淮南子孟春招搖指寅仲春指卯季春指辰孟夏指已仲夏指午季夏指未孟秋指中仲秋指酉季秋指戌孟冬指亥仲冬指子季冬指丑漢志云閏月無中炁斗余指雨辰之間漢晉志云北斗七政之樞機陰陽之本元運乎天中而臨制四方以建四時輔星傳乎闓陽所以佐斗而成功者也日月次舍交會圖堯典曰歷象日月星辰敬授人時注云日月所會歷象其分節是謂日月交會于十二次也左傳云日月之會是謂辰月令注云日月之行一歲十二會蓋周天三百六十五度四分度之一日行遲一日經一度一歲一周天月行速一日經十三度一月一周天更行二十九日半方與日相會也陰陽變合消長圖太玄經子則陽生于十一月陰終于十月午則陰生于五月陽終于四月觀此則乾坤消息可見矣陽生于子而終于已故乾為四月之卦陰生于午而終于亥故坤為十月之卦蓋陰不極則陽不生故先坤而后復陽不極則陰不萌故先乾而后姤余皆以意推之則陰陽消長之理又可知矣律管淺深候氣圖隋天文志候氣之法先治一室令地極平乃埋列管皆使上齊入地有淺深各從其方位排列以葭莩灰實管中候之氣至則一律飛灰假如冬至陽氣距地面九寸而至惟黃鐘一管達之故黃鐘為之應正月距地面八寸止自太簇以上皆達黃鐘大呂皆已虛故惟太簇一律飛灰余皆仿此律呂損益相生圖荊璞集曰律以統氣類物呂以旅陽宣氣律呂者氣候之管也以銅為之某月氣至則某律為應焉應謂吹葭灰也然必隔八相生而又始于黃鐘之九寸而黃復始于十一月者蓋物以三成聲以五立以三參五而八數成矣人以八尺而為尋物以八竅而卵生故十二律之音皆隔八而成焉, WYG: ''}
