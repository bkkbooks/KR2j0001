  - {type: variant, offset: 1627, length: 173, content: 八宿周于圓穹之度以麗十二位也隨天而轉謂之經星堯典四仲迭見之星則午為正月令昏旦迭見之星則以未為中蓋星之運始則見于辰終則伏于戍自辰至戌正于午而中于未故堯典言日永星火以正仲夏是以午為正也月令至于季夏乃曰昏火中則是以未為中左傳曰火星中而寒暑退詩曰定之方中亦皆以未中也閏月成歲為章之圖先王體元以居正順時以授民是必迎日以推策之啟閉以為節分至以為中推閏定時以成, WYG: ''}
