  - {type: variant, offset: 1352, length: 0, content: '', WYG: 暴雨為涷雨離騷經云令飄風兮先驅使涷雨兮洗塵涷音東海颶風南越志熙安間多颶風颶風者具四方之風也常以五六月發未至時雞犬為之不鳴國史補云南海有颶風四面而至倒屋拔木每數年一作鄭熊番禺雜記云颶風將𤼵有微風細雨先緩後急謂之鍊風又有石尤風亦颶之𩔖韓文公詩云雷威固已加颶勢仍相借又云颶風有時作掀簸真差事又云峽山逢颶風雷電助撞捽颶音具落梅風風俗通五月有落梅風江南以為信風李白詩云天長信風吹日出宿霧散黄雀風風土記南中六月則有東南長風止時海魚化為黄雀故俗名黄雀風麥黄水水衡記黄河水四月名麥黄水瓜蔓水水衡記黄河水五月名𤓰蔓水𤓰}
