  - {type: variant, offset: 1353, length: 0, content: '', WYG: 蔓也東坡詩云河水渺緜瓜蔓流山礬水水衡記黄河水六月名山礬水麥熟秋月令章句百穀各以初生為春熟為秋故麥以孟夏為秋山谷詩云生物趨功日夜流園林纔夏麥先秋趙師民詩云麥秋晨氣潤槐夏午隂涼分龍節圖經池州俗以五月二十九三十日為分龍節雨則多大水閩人以夏至後為分龍雨各有方龍生日岳州風土記五月十}
