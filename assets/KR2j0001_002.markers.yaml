  - {type: variant, offset: 756, length: 245, content: 極陽十一月得甲曰畢辜十二月得乙曰橘涂周而復始抑又可知也月名之圖容齋隨筆太史公歷書以閼逢為焉逢旃蒙為端蒙柔兆為游兆疆圉為疆梧著雍為徒維屠唯為祝犁上章為商橫重光為昭陽元弋為橫艾昭陽為尚章大荒落為大芒落協洽為汁洽涒灘為赤奮若作噩為作鄂閹茂為淹茂大淵獻與困敦更互赤奮若乃為芮漢此年久傳說不必深辨氣候循環易見圖尚書正義曰節氣者周天三百六十五日四分日之一分為十二月則月各得二十日十六分日之七以初為節氣半為中氣故一歲有二十四氣分居辰次焉董巴議曰伏犧造八卦作三劃以象二十四氣一行卦候驗曰七十二候原于周公較諸, WYG: 徂暑}
