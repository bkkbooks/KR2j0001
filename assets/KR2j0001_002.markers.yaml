  - {type: variant, offset: 2, length: 0, content: '', WYG: 二宋陳元靚撰夏禮記鄉飲酒曰南方曰夏夏之為言假也養之長之假之仁也太𤣥經曰夏者物之修長也董仲舒策曰陽常居大夏以生育長養為事淮南子曰夏為衡衡者所以平萬物也前漢律厯志曰太陽者南方南任也陽氣任養物於時為夏夏假也物假大乃宣平火炎上禮者齊齊者平故為衡也}
