  - {type: variant, offset: 19, length: 3, content: 盛德在, WYG: 是也故謂之正陽之月又曰四月陽雖用事而陽不獨存此月純陽疑於無隂故亦謂之隂月纂要曰四月曰首夏維夏文選注鄭𤣥曰四月為除月月令曰孟夏行秋令則苦雨數來五穀不滋四鄙入保行冬令則草}
