  - {type: variant, offset: 1360, length: 1, content: 初, WYG: 十三日獨醉或為人迎置他處不知也當時諺曰此君經年常清齋一日不齋醉如泥有時倒載過晉地茫然乗墜俱不知宋子京種竹詩云隂地圍牆植翠筠疎枝茂葉與時新賴逢醉日終無損正似徳全於酒人晏元獻公詩云竹醉人還醉蠶眠我亦眠又云苒苒渭濵族蕭蕭塵外姿如能樂封植何必醉中移又東坡詩云竹是當年醉日栽竹迷日筍譜民間説竹有生日即五月十三日移竹宜用此日或隂雨土虚則鞭行明年筍莖交至一云竹迷日栽竹年年生筍劉延世竹迷日種竹詩云梅蒸方過有餘潤竹醉由来自古云掘地聊栽數竿玉開簾還當一溪雲然則竹迷亦此日也陳簡齋種竹詩云何須俟迷日可笑世俗情櫻笋厨唐輦下歲時記四月十五日自堂厨至百司厨通謂}
