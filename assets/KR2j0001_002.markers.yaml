  - {type: variant, offset: 1256, length: 1, content: 光, WYG: 為入梅芒種後逢壬日為出梅農人以得梅雨乃宜耕稼故諺云雨不梅無米炊𤨏碎録又云芒種後逢壬入梅前半月為梅雨後半月為時雨遇雷雹謂之斷梅數説未知孰是又陳氏手記云梅雨水洗瘡疥滅瘢痕入醬令易熟沾衣便腐澣垢如灰汁有異他水江淮以南地氣卑濕五月上旬連下旬尤甚梅雨壊衣當以梅葉湯洗之餘並不脱杜甫詩云南京犀浦道四月熟黄梅湛湛長江去𠖇𠖇細雨来歐陽公詩云春寒欲盡黄梅雨東坡詩云不趁青梅嘗煮酒要看細雨濕黄梅又云佳節連梅雨又云怕見黄梅雨細時嚴維詩云梅天一雨清送梅雨埤雅今江湘二浙四五月間梅欲黄落則水潤土溽柱磉皆汗蒸鬱成雨謂之梅雨自江以南三月雨謂之迎梅五月雨謂之送梅林逋詩云石枕涼生菌閣虛已應梅潤入圖書濯枝雨風土記仲夏雨濯枝盪川注云此節常有大雨名}
