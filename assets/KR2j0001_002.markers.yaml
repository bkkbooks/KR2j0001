  - {type: variant, offset: 13, length: 0, content: '', WYG: 曰孟夏之月日在畢昬翼中旦婺女中律中中音仲吕螻蟈鳴蚯蚓出王𤓰生苦菜秀靡草死麥秋至孝經緯曰穀雨後十五日斗指巽為立夏後十五日斗指已為小滿三統厯曰立夏為四月節小滿為四月中氣小滿者言物長於此小得盈滿周書時訓曰立夏之日螻蟈鳴後五日蚯蚓出後五日王𤓰生小滿之日苦菜秀後五日靡草死後五日麥秋至白虎通德論曰四月律謂之中吕何言陽氣極將彼故復中難之也晉志云吕者助也謂陽氣盛長陰助成功也晉樂志曰四月之辰謂之己巳者起也物至此時畢盡而起也夏小正曰四月昴則見詩七月曰四月秀葽}
