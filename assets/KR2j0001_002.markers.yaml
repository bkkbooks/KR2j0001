  - {type: variant, offset: 1418, length: 1, content: 遙, WYG: 暑月候大雷霆時収雨水淘米炊飯釀酒名曰霹􅋬酒寒筵氷醉鄉日月盛夏初昏於井側安鑊用大水晶一塊大如拳無瑕釁者以新汲水熾火煑千沸取越瓶口小腹大者滿盛其湯以油帛密封口勿令泄氣復以重湯煮千沸急沈井底平旦出之破瓶氷已結矣名寒筵氷又見杜陽雜編壬癸席河東備録申王取猪毛刷浄命工織以為席滑而且涼號曰壬癸席澄水帛杜陽編同昌公主一日大㑹暑氣將甚公主命取澄水帛以水蘸之挂於髙軒滿座皆思挾纊澄水帛長八九尺似布細明薄可鑒云其中有龍涎故能消暑氷絲裀樂府雜録唐老子本長安富家子生計蕩盡遇老嫗持舊裀以半千獲之有波斯人見之乃曰此是氷蠶絲所織暑月置於座滿室清凉即酬千萬消涼珠拾遺記黒蚌珠千年一生燕昭王常懷此珠當盛暑之月體自輕涼號消暑招涼之珠辟暑犀提要録唐文宗夏日延學士講易賜辟暑犀章簡公端午帖子云已持犀辟暑更鬬草迎涼迎涼草杜陽襍編李輔國夏則于堂中設迎涼草其象𩔖如草而榦似若竹葉細如杉雖若乾枯而未嘗彫落盛暑挂之忩户間則涼風自至白龍皮劇談録李}
