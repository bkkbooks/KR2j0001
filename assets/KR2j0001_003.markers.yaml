  - {type: variant, offset: 2675, length: 263, content: 齊盧士深妻崔林義之女有才學春日以桃花靧面靧曰取紅花取白雪與兒洗面作光悅取白雪取紅花與兒洗面作光華取雪白取花紅與兒洗面作顏容裝獅花曲江春宴錄曲江貴家遊賞則剪百花裝成獅子互相送遺獅子有小連環欲送則以蜀錦流蘇牽之唱曰春光且莫去留與醉人看探花使秦中歲時記進士杏花苑初會謂之探花宴以少俊二人為探花使徧遊名園若他人先折得名花則二使皆有罰護花鈴天寶遺事天寶初甯王少時好聲色風流蘊藉諸王弗如也每春日於後園中紐紅絲為繩綴金鈴繫花梢之上有烏鵲翔集則令園吏掣鈴索以驚之號護花鈴括花香唐玉麈錄穆宗每宮中花香則以重頂帳蒙蔽檻外置惜春御史掌之號曰括香臥花, WYG: 辰星求長命乃免獻菊}
  - {type: variant, offset: 2675, length: 263, content: 齊盧士深妻崔林義之女有才學春日以桃花靧面靧曰取紅花取白雪與兒洗面作光悅取白雪取紅花與兒洗面作光華取雪白取花紅與兒洗面作顏容裝獅花曲江春宴錄曲江貴家遊賞則剪百花裝成獅子互相送遺獅子有小連環欲送則以蜀錦流蘇牽之唱曰春光且莫去留與醉人看探花使秦中歲時記進士杏花苑初會謂之探花宴以少俊二人為探花使徧遊名園若他人先折得名花則二使皆有罰護花鈴天寶遺事天寶初甯王少時好聲色風流蘊藉諸王弗如也每春日於後園中紐紅絲為繩綴金鈴繫花梢之上有烏鵲翔集則令園吏掣鈴索以驚之號護花鈴括花香唐玉麈錄穆宗每宮中花香則以重頂帳蒙蔽檻外置惜春御史掌之號曰括香臥花, krp: 辰星求長命乃免獻菊}
