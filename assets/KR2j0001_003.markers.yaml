  - {type: variant, offset: 3972, length: 228, content: 日雨人食三升四日雨人食四升五日雨主大熟五日內霧穀傷民飢元日霧歲必飢禳鬼鳥荊楚歲時記正月夜多鬼鳥度家家槌床打戶捩狗耳滅燈火以禳之玄中記云此鳥名姑獲一名天帝女一名隱飛鳥一名夜遊女好取人女子養之有小兒之家即以血點其衣以為誌故世號鬼鳥荊湖彌多斯言信矣飲雨水本草三月雨水夫妻各飲一杯還房獲時有子神助也去妖邪西京雜記賈佩蘭云在宮中正月上辰出池邊盥濯食蓬餌以祓妖邪辟官事歷書二月上丑日取土泥蠶屋宜蠶上辰日取道中土泥門應辟官事照百鬼荊楚歲時記正月未日夜蘆苣火照井廁百鬼皆走, WYG: ''}
