  - {type: variant, offset: 2333, length: 303, content: 弟每至春日遊宴供帳於園圃中隨行載以油幕或遇陰雨以幕覆之盡歡而歸掛裙幄唐輦下歲時記長安士女遊春野步遇名花則設席藉草以紅裙插掛以為宴幄其奢侈如此擲金錢開元別紀明皇與貴妃在花蕚樓下以金錢遠近為限賽其無擲于地者以金觥賞之天寶遺事云內庭妃嬪每至春日各于禁中結伴擲金錢為戲駐馬飲天寶遺事長安俠士每春日結朋約黨各置矮馬飾以錦韉金絡並轡於花樹下往來使僕從執酒盃而從之遇好花則駐馬而飲隨蝶幸開元遺事開元末明皇每春時旦暮宴於宮中使嬪妃輩爭插豔花帝親捉粉蝶放之隨蝶所止幸之後貴妃專寵遂不復用此戲鬭奇花天寶遺事長安王士安春時鬭花戴插以奇花多者為勝皆用千金市名花植于庭中以備春時之鬭插御花天寶遺事長安春日盛於遊賞園林日無閒地蘇頲應制, WYG: 阿符讀書城南}
