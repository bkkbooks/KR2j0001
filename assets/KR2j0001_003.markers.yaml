  - {type: variant, offset: 623, length: 1, content: 驚, WYG: 處暑三統厯曰立秋為七月節處暑為七月中氣處暑者謂暑將退伏而潛處也周書時訓曰立秋之日涼風至後五日白露降後五日寒蜩鳴涼風不至國無嚴政白露不降民多欬病寒蜩不鳴人臣力爭處暑之日鷹乃祭鳥後五日天地始肅後五日農乃登穀白虎通徳論曰七月律謂之夷則何夷傷則法也言萬物始傷破刑法也歐陽公秋聲賦云其在樂也商聲主西方之音夷則為七月之律商傷也物至老而傷悲夷戮也物既盛而當戮晉樂志曰七月之辰謂為申申者身也言時萬物身體皆成就也夏小正曰七月狸子肇肆肇始也肆遂也言其始遂也詩七月曰七月流火又曰七月鳴鵙又曰七月烹葵及菽又曰七月食瓜注云流下也火大火也李白詩云火落金風髙謝靈運詩云火逝首秋節七命云龍火西頺提要録曰七月為蘭月纂要曰七月曰首秋上秋蘭秋肇秋月令曰孟秋行冬令則陰氣大勝介蟲敗榖戎兵乃來行春令則其國乃旱陽氣復還五榖無實行夏令則國多火災寒熱不節民多瘧疾仲秋月月令曰仲秋之月日在角昏牽牛中旦觜觿中律中南吕盲風至鴻雁來𤣥鳥歸羣鳥養羞日夜分雷乃收聲}
