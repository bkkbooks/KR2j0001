  - {type: punctuation, offset: 3238, content: 《, id: KR2j0001_CHANT_003-bkkpn840}
  - {type: variant, offset: 3238, length: 460, content: 四民月令清明節令蠶妾理蠶室是月也杏花盛又云杏花生種百穀宋子京詩云催耕併及杏花時蜀主孟昶勸農詔云望杏敦耕瞻蒲勸穡王元長策秀才文云杏花菖葉耕穫不愆看菖葉呂氏春秋冬至後五旬七日菖葉生蓋菖者百草之先生也於是始耕又云菖始生於是耕儲光羲詩云菖葉日巳長杏花日已滋農人要看此貴不違天時種辰瓜齊民要術三月辰日最宜種瓜山谷詩云夏栽醉竹餘千箇春糞辰瓜滿百區栽雜木汜勝書栽樹正月為上時二月為中時三月為下時然棗雞口槐兔目桑蝦蟆眼榆負瘤散其餘雜木鼠耳蛇趄各其時凡種栽并插皆用此等形象遊蜀江杜氏壺中贅錄蜀中風俗舊以二月二日為踏青節都人士女絡繹遊賞緹幕歌酒散在四郊歷政郡守慮有強暴之虞乃分遣戍兵於岡阜坡塚之上立馬張旗望之後乖崖公帥蜀迺曰慮有他虞不若聚之為樂乃于是日自萬里橋以錦繡器皿結綵舫十數隻與郡僚屬官分乘之妓樂數船歌吹前導名曰遊江於是都人士女駢於八九里間縱觀如堵抵寶歷寺橋出讌于寺內寺前刱一蠶市縱民交易嬉遊樂飲倍於往歲薄暮方回售農用四川記同州以二月二日與八日為市四方村民畢集應蠶農所用以至車檐椽木果樹器用雜物皆至其值千緍至萬緍者郡守就子城之東北隅龍, WYG: 解語水晶宫漁隠叢話呉}
