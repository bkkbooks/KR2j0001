  - {type: variant, offset: 3096, length: 17, content: 褉除則賜柳圈辟癘羹錦帶荊湖近事荊渚, WYG: 清鱸魚肥遂命駕而歸後齊王敗人皆謂之見機又海物異名記云江南人作鱠名郎官鱠言因張翰得名東坡詩云浮世功名食與眠季鷹直得水中仙不須更説知機早直為鱸魚也自賢又送人歸呉有詞云更有鱸魚堪切鱠山谷詩云東歸止為鱸魚鱠未敢知言許季鷹王荆公詩云慷慨秋風起悲歌不為鱸收兎毫墨藪筆取崇山絕仭中兎毛八九月收之筆頭長一寸管長五寸鋒齊腰彊者揮襟作之屈曲真草皆須盡一身之力而送之騐美玉地鏡經八月中草不死有葉枝下垂者必有美玉又云八月後草不死者亦有玉㸃艾杖文昌雜録唐歳時節物八月一日有㸃艾杖盧公範饋餉儀云㸃艾杖以棃枝為之及銀盞}
