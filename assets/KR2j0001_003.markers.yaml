  - {type: variant, offset: 1577, length: 202, content: 春岸桃花水又云三月桃花浪注曰峽中以三月桃花發時春水生謂之桃花水王摩詰詩云春來到處桃花水又歐陽公詩云桃花水下清明路擊春曲酉陽雜俎唐明皇好羯鼓云八音之領袖諸樂不可為比嘗遇二月初詰旦巾櫛方畢時宿雨初晴景色明麗小殿亭前柳杏將吐覩而嘆曰對茲景物豈可不與他判斷乎左右相目將命備酒獨高力士遣取羯鼓旋命之臨軒縱擊一曲名春光好神思自得反顧杏花皆已發坼指而笑之謂嬪嬙內官曰此一事不喚我作天公可乎皆呼萬歲東坡詩云宮中羯鼓催花柳, WYG: 揺落深知宋玉悲}
